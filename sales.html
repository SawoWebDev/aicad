<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation Logs — SAWO CAD</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<!--
  Sales/Admin conversation viewer. Reads through the role-guarded API
  (/api/conversations) using server-side service-role access — no Supabase key
  is exposed to the browser. Replaces the old logs.html that hit Supabase directly.
-->
<style>
  :root{
    --brown:#AF8564; --brown-deep:#AF8564; --brown-mid:#A67853; --brown-light:#C4A574;
    --black:#141617; --bg:#faf7f3; --panel:#fff; --line:#e7ddd2; --text-dim:#8a7c6e;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ margin:0; background:var(--bg); color:var(--black); font-family:'Montserrat',sans-serif; font-size:14px; line-height:1.5; }
  #shell{ display:flex; flex-direction:column; height:100vh; }
  /* ── Shared page header (identical across all CMS frames) ── */
  .page-header{
    display:flex; align-items:center; gap:14px; padding:16px 26px; background:var(--panel);
    border-bottom:1px solid var(--line); flex-shrink:0; box-shadow:0 1px 0 rgba(139,94,60,0.04);
  }
  .ph-icon{
    width:42px; height:42px; border-radius:11px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff; font-size:1.05rem;
    box-shadow:0 6px 16px rgba(166,120,83,0.32);
  }
  .ph-text h2{ font-size:1.08rem; font-weight:700; margin:0; color:var(--brown-deep); letter-spacing:0.2px; }
  .ph-text p{ font-size:0.74rem; color:var(--text-dim); margin:1px 0 0; }
  .actions{ margin-left:auto; display:flex; align-items:center; gap:12px; }
  .count-pill{
    display:inline-flex; align-items:center; gap:8px; font-size:0.72rem; font-weight:600;
    text-transform:uppercase; letter-spacing:0.05em; color:var(--brown-deep);
    padding:6px 13px; border:1px solid var(--line); border-radius:20px;
  }
  .count-pill.err{ color:#C9302C; border-color:rgba(201,48,44,0.35); }
  .btn{
    border:2px solid var(--brown-mid); border-radius:8px; background:transparent; color:var(--brown-deep);
    font-family:'Montserrat',sans-serif; font-weight:600; font-size:0.74rem; letter-spacing:0.04em;
    text-transform:uppercase; padding:8px 13px; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
    transition:all 0.25s ease;
  }
  .btn:hover{ background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff; border-color:transparent; }
  #app{ display:grid; grid-template-columns:380px 1fr; flex:1; min-height:0; padding:16px; gap:16px; background:var(--bg); }
  .left,.right{ display:flex; flex-direction:column; min-height:0; background:var(--panel); border-radius:14px; box-shadow:0 10px 30px rgba(139,94,60,0.06); border:1px solid var(--line); overflow:hidden; }
  .list-head{ padding:12px 14px; border-bottom:1px solid var(--line); flex-shrink:0; display:flex; gap:10px; align-items:center; }
  .list-head #search{ flex:1; min-width:0; }
  .select-toggle{ flex-shrink:0; padding:8px 11px; }
  #search{
    width:100%; border:1.5px solid var(--line); border-radius:8px; background:#fff; color:var(--black);
    font-family:'Montserrat',sans-serif; font-size:0.85rem; padding:9px 12px; outline:none; transition:border-color 0.2s;
  }
  #search:focus{ border-color:var(--brown-mid); }
  #sessionList{ flex:1; overflow-y:auto; min-height:0; }
  #sessionList::-webkit-scrollbar{ width:7px; }
  #sessionList::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  .session-item{ padding:12px 14px; border-bottom:1px solid var(--line); cursor:pointer; transition:background 0.15s; }
  .session-item:hover{ background:var(--bg); }
  .session-item.active{ background:var(--bg); border-left:4px solid var(--brown-mid); padding-left:10px; }
  .si-top{ display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:5px; }
  .si-time{ font-size:0.7rem; color:var(--text-dim); font-weight:600; }
  .si-badges{ display:flex; gap:5px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
  .badge{ font-size:0.6rem; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; padding:2px 7px; border-radius:10px; }
  .badge.img{ background:rgba(74,157,74,0.12); color:#4A9D4A; }
  .badge.noimg{ background:rgba(138,124,110,0.12); color:var(--text-dim); }
  .badge.msgs{ background:rgba(166,120,83,0.12); color:var(--brown-deep); }
  .badge.sales{ background:rgba(139,94,60,0.16); color:var(--brown-deep); }
  .si-contact{ font-size:0.72rem; font-weight:600; color:var(--brown-deep); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
  .si-snippet{ font-size:0.78rem; color:var(--black); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.4; }
  /* Multi-select (admin only): per-row checkbox + bulk-delete bar. */
  .si-left{ display:flex; align-items:center; gap:8px; min-width:0; }
  .si-check{ width:15px; height:15px; accent-color:var(--brown-mid); cursor:pointer; flex-shrink:0; }
  .bulk-bar{ display:none; align-items:center; gap:12px; padding:9px 14px; border-bottom:1px solid var(--line); background:#fff; flex-shrink:0; }
  .bulk-bar.show{ display:flex; }
  .bulk-all{ display:flex; align-items:center; gap:7px; font-size:0.72rem; font-weight:600; color:var(--text-dim); cursor:pointer; user-select:none; }
  .bulk-all input{ width:15px; height:15px; accent-color:var(--brown-mid); cursor:pointer; }
  .btn.danger{ margin-left:auto; border-color:rgba(201,48,44,0.45); color:#C9302C; }
  .btn.danger:hover:not(:disabled){ background:#C9302C; color:#fff; border-color:#C9302C; }
  .btn.danger:disabled{ opacity:0.45; cursor:not-allowed; }
  /* Loading state shown in the list while sessions are fetched. */
  .list-loading{ padding:28px 16px; text-align:center; color:var(--text-dim); font-size:0.82rem; display:flex; align-items:center; justify-content:center; gap:8px; }
  .detail-head{ padding:14px 20px; border-bottom:1px solid var(--line); flex-shrink:0; display:flex; flex-wrap:wrap; gap:8px 22px; align-items:center; }
  .dh-title{ font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--brown-deep); }
  .meta{ font-size:0.72rem; color:var(--text-dim); }
  .meta b{ color:var(--black); font-weight:600; }
  /* Manual sales handoff button — sits next to Copy link, styled as the filled
     primary action so it reads as the deliberate "send" step. */
  .send-sales{ border-color:transparent; background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff; }
  .send-sales:hover{ border-color:transparent; background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff; filter:brightness(1.06); }
  .send-sales:disabled{ opacity:0.55; cursor:not-allowed; filter:none; }
  /* Clean detail header: a title (client name + subject) on the left, the three
     actions on the right, and a collapsible meta panel toggled by "Details". */
  .dh-row{ display:flex; align-items:center; gap:14px; width:100%; }
  .dh-titlewrap{ min-width:0; }
  .dh-name{ font-size:0.98rem; font-weight:700; color:var(--brown-deep); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dh-name i{ color:var(--brown-mid); margin-right:4px; }
  .dh-subject{ font-size:0.78rem; color:var(--text-dim); line-height:1.3; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .dh-actions{ margin-left:auto; display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .btn.active{ background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff; border-color:transparent; }
  .dh-sendresult{ width:100%; margin-top:10px; font-size:0.8rem; font-weight:600; color:#4A9D4A; display:flex; align-items:center; gap:8px; }
  .dh-sendresult.err{ color:#C9302C; }
  /* Hamburger menu in the detail header — collapses the secondary actions (Copy
     link / Analytics / Details) so the header stays clean. Mirrors admin.html's
     row-action dropdown pattern. */
  .dh-dropdown{ position:relative; display:inline-block; }
  .dh-burger{ display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; padding:0; gap:0; }
  .dh-menu{ position:absolute; right:0; top:calc(100% + 6px); min-width:186px; background:#fff; border:1px solid var(--line); border-radius:10px; box-shadow:0 12px 30px rgba(139,94,60,0.20); z-index:120; overflow:hidden; padding:5px; }
  .dh-menu.hidden{ display:none; }
  .dh-menu button{ display:flex; align-items:center; gap:10px; width:100%; text-align:left; border:none; background:transparent; color:var(--brown-deep); font-family:'Montserrat',sans-serif; font-weight:600; font-size:0.76rem; padding:9px 12px; border-radius:7px; cursor:pointer; }
  .dh-menu button i{ width:15px; text-align:center; color:var(--brown-mid); }
  .dh-menu button:hover{ background:var(--bg); }
  /* Conversation details modal — replaces the old inline meta panel. Reuses the
     analytics modal's centered-overlay look, sized smaller for a metadata card. */
  #dtlScrim{ position:fixed; inset:0; background:rgba(20,22,23,0.55); opacity:0; visibility:hidden; transition:opacity .22s ease; z-index:99998; }
  #dtlScrim.open{ opacity:1; visibility:visible; }
  #dtlModal{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.96);
    width:min(620px,94vw); max-height:88vh; background:var(--bg); border-radius:16px;
    box-shadow:0 30px 90px rgba(20,22,23,0.42); opacity:0; visibility:hidden;
    transition:opacity .22s ease, transform .22s ease; z-index:99999;
    display:flex; flex-direction:column; min-height:0; overflow:hidden;
  }
  #dtlModal.open{ opacity:1; visibility:visible; transform:translate(-50%,-50%) scale(1); }
  .dtl-head{ display:flex; align-items:center; gap:12px; padding:16px 20px; flex-shrink:0; background:linear-gradient(120deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff; }
  .dtl-head .dtl-ico{ width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.16); font-size:0.95rem; flex-shrink:0; }
  .dtl-head h3{ margin:0; font-size:0.95rem; font-weight:700; letter-spacing:0.3px; }
  .dtl-head .dtl-sub{ font-size:0.68rem; opacity:0.85; margin-top:1px; }
  .dtl-close{ margin-left:auto; background:rgba(255,255,255,0.14); border:none; color:#fff; width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:0.9rem; flex-shrink:0; transition:background .2s; }
  .dtl-close:hover{ background:rgba(255,255,255,0.28); }
  .dtl-body{ padding:20px 22px 24px; overflow-y:auto; min-height:0; }
  .dtl-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px 22px; }
  .dtl-grid .m{ font-size:0.66rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; }
  .dtl-grid .m b{ display:block; margin-top:4px; font-size:0.86rem; font-weight:600; color:var(--black); text-transform:none; letter-spacing:0; word-break:break-word; }
  /* txt block toolbar (toggle + copy) */
  .txtblock-head{ display:flex; align-items:center; gap:10px; }
  .txtblock-copy{ display:inline-flex; align-items:center; gap:7px; background:transparent; border:1px solid var(--line); border-radius:8px; color:var(--brown-deep); font-family:'Montserrat',sans-serif; font-weight:600; font-size:0.74rem; letter-spacing:0.04em; text-transform:uppercase; padding:7px 13px; cursor:pointer; }
  .txtblock-copy:hover{ border-color:var(--brown-mid); }
  /* image lightbox */
  #logLightbox{ position:fixed; inset:0; background:rgba(20,22,23,0.92); display:none; align-items:center; justify-content:center; z-index:99999; padding:28px; cursor:zoom-out; }
  #logLightbox.show{ display:flex; }
  #logLightbox img{ max-width:100%; max-height:100%; border:2px solid var(--brown-mid); border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  #detailBody{ flex:1; overflow-y:auto; min-height:0; padding:20px; background:var(--bg); }
  #detailBody::-webkit-scrollbar{ width:8px; }
  #detailBody::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  .transcript{ display:flex; flex-direction:column; gap:12px; max-width:820px; margin:0 auto; }
  .msg{ padding:10px 14px; border-radius:12px; font-size:0.86rem; line-height:1.55; max-width:88%; white-space:pre-wrap; word-break:break-word; }
  .msg.user{ align-self:flex-end; background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff; box-shadow:0 5px 15px rgba(139,94,60,0.2); border-top-right-radius:4px; }
  .msg.assistant{ align-self:flex-start; background:#fff; border-left:4px solid var(--brown-mid); box-shadow:0 5px 15px rgba(139,94,60,0.08); border-top-left-radius:4px; }
  .msg .who{ display:block; font-size:0.62rem; font-weight:700; letter-spacing:0.12em; margin-bottom:4px; }
  .msg.user .who{ color:rgba(255,255,255,0.8); }
  .msg.assistant .who{ color:var(--brown-mid); }
  /* Per-reply AI model tag — admin-only (rendered only when the signed-in user
     is an admin). Mirrors the chat widget's inline "AI · <model>" badge. */
  .msg .who .ai-tag{
    display:inline-block; margin-left:8px; vertical-align:middle;
    font-size:0.56rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
    padding:1px 7px; border-radius:10px; line-height:1.6;
    background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff;
  }
  .txtblock-wrap{ max-width:820px; margin:22px auto 0; }
  .txtblock-toggle{ display:inline-flex; align-items:center; gap:8px; background:transparent; border:1px solid var(--line); border-radius:8px; color:var(--brown-deep); font-family:'Montserrat',sans-serif; font-weight:600; font-size:0.74rem; letter-spacing:0.04em; text-transform:uppercase; padding:7px 13px; cursor:pointer; }
  .txtblock-toggle:hover{ border-color:var(--brown-mid); }
  pre.txtblock{ margin:12px 0 0; padding:16px; background:#20242a; color:#e8dfd3; border-radius:10px; overflow:auto; font-family:'Courier New',monospace; font-size:0.72rem; line-height:1.45; white-space:pre; max-height:460px; }
  .image-wrap{ max-width:820px; margin:22px auto 0; }
  .image-label{ font-size:0.74rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:var(--brown-deep); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  img.gen-image{ max-width:100%; max-height:480px; display:block; border:1px solid var(--line); border-radius:10px; cursor:zoom-in; box-shadow:0 12px 35px rgba(139,94,60,0.18); }
  .placeholder{ height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:var(--text-dim); }
  .placeholder .icon-wrapper{ width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--brown-mid) 0%,var(--brown-light) 100%); display:flex; align-items:center; justify-content:center; margin-bottom:18px; box-shadow:0 10px 28px rgba(166,120,83,0.35); }
  .placeholder .icon-wrapper i{ font-size:2rem; color:#fff; }
  .placeholder h3{ font-size:1.1rem; color:var(--brown-deep); margin:0 0 6px; }
  .placeholder p{ font-size:0.85rem; margin:0; max-width:420px; }
  .placeholder.error h3{ color:#C9302C; }
  .placeholder pre{ margin-top:14px; font-size:0.72rem; background:#20242a; color:#e8dfd3; padding:12px 16px; border-radius:8px; max-width:560px; white-space:pre-wrap; text-align:left; }
  @media (max-width:820px){ #app{ grid-template-columns:1fr; grid-template-rows:240px 1fr; } }

  /* ════════════ Conversation Analytics modal (admin-only) ════════════ */
  #anvScrim{ position:fixed; inset:0; background:rgba(20,22,23,0.55); opacity:0; visibility:hidden; transition:opacity .25s ease; z-index:99998; }
  #anvScrim.open{ opacity:1; visibility:visible; }
  #anvDrawer{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.96);
    width:min(1360px,96vw); height:96vh; max-height:none;
    background:var(--bg); border-radius:16px; box-shadow:0 30px 90px rgba(20,22,23,0.42);
    opacity:0; visibility:hidden; transition:opacity .25s ease, transform .25s ease; z-index:99999;
    display:flex; flex-direction:column; min-height:0; overflow:hidden;
  }
  #anvDrawer.open{ opacity:1; visibility:visible; transform:translate(-50%,-50%) scale(1); }
  .anv-head{
    display:flex; align-items:center; gap:12px; padding:16px 20px; flex-shrink:0;
    background:linear-gradient(120deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff;
  }
  .anv-head .anv-ico{ width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.16); font-size:0.95rem; flex-shrink:0; }
  .anv-head h3{ margin:0; font-size:0.95rem; font-weight:700; letter-spacing:0.3px; }
  .anv-head .anv-sub{ font-size:0.68rem; opacity:0.85; margin-top:1px; }
  .anv-headbtn{ margin-left:auto; background:rgba(255,255,255,0.16); border:none; color:#fff; height:32px; padding:0 13px; border-radius:8px; cursor:pointer; font-size:0.74rem; font-weight:700; letter-spacing:0.02em; flex-shrink:0; transition:background .2s; display:inline-flex; align-items:center; gap:7px; }
  .anv-headbtn:hover{ background:rgba(255,255,255,0.3); }
  .anv-headbtn.active{ background:#fff; color:var(--brown-deep); }
  .anv-close{ margin-left:8px; background:rgba(255,255,255,0.14); border:none; color:#fff; width:32px; height:32px; border-radius:8px; cursor:pointer; font-size:0.9rem; flex-shrink:0; transition:background .2s; }
  .anv-close:hover{ background:rgba(255,255,255,0.28); }
  .anv-body{ flex:1; overflow-y:auto; min-height:0; padding:22px 26px 34px; }
  .anv-body::-webkit-scrollbar{ width:8px; }
  .anv-body::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  .anv-loading,.anv-empty{ padding:46px 16px; text-align:center; color:var(--text-dim); font-size:0.85rem; display:flex; flex-direction:column; align-items:center; gap:10px; }
  .anv-empty i{ font-size:1.6rem; color:var(--brown-light); }
  .anv-warn{ background:#fff7e6; border:1px solid #e8d28a; color:#7a5c12; border-radius:10px; padding:12px 14px; font-size:0.78rem; line-height:1.5; }
  .anv-warn code{ background:#f0e6c8; padding:1px 5px; border-radius:4px; }
  .anv-section{ margin-top:22px; }
  .anv-section-label{ font-size:0.66rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--brown-deep); margin-bottom:11px; display:flex; align-items:center; gap:7px; }
  .anv-section-label i{ color:var(--brown-mid); }
  /* Summary cards */
  .anv-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
  .anv-card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:13px 14px; border-top:3px solid var(--brown-mid); }
  .anv-card-head{ display:flex; align-items:center; gap:8px; }
  .anv-card-ico{ width:24px; height:24px; border-radius:7px; display:inline-flex; align-items:center; justify-content:center; font-size:0.74rem; flex-shrink:0; }
  .anv-card-label{ font-size:0.62rem; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-dim); }
  .anv-card-big{ font-size:1.18rem; font-weight:800; color:var(--black); margin-top:7px; line-height:1.2; }
  .anv-card-sub{ font-size:0.66rem; color:var(--text-dim); margin-top:3px; }
  /* Model / provider badge (shared visual with admin dashboard) */
  .mbadge{ display:inline-flex; align-items:center; gap:6px; font-size:0.78rem; font-weight:600; color:var(--black); }
  .mbadge .dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  /* Tables */
  .anv-table{ width:100%; border-collapse:collapse; font-size:0.76rem; background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .anv-table th,.anv-table td{ padding:8px 10px; text-align:left; border-bottom:1px solid var(--line); white-space:nowrap; }
  .anv-table th{ font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-dim); background:var(--bg); }
  .anv-table th.num,.anv-table td.num{ text-align:right; }
  .anv-table th.sortable{ cursor:pointer; user-select:none; }
  .anv-table th.sortable:hover{ color:var(--brown-deep); }
  .anv-table th .ar{ color:var(--brown-mid); }
  .anv-table tbody tr:last-child td{ border-bottom:none; }
  .anv-table tr.anv-top td{ background:rgba(166,120,83,0.09); font-weight:600; }
  .anv-table tr.anv-totals td{ background:var(--bg); font-weight:700; border-top:2px solid var(--line); }
  .anv-table .u{ color:var(--text-dim); font-weight:400; font-size:0.62rem; }
  /* Token-flow bars */
  .anv-flow-row{ display:flex; align-items:center; gap:10px; margin-bottom:9px; }
  .anv-flow-name{ width:130px; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; }
  .anv-flow-wrap{ flex:1; display:flex; }
  .anv-flow-track{ height:16px; border-radius:5px; overflow:hidden; display:flex; min-width:3px; }
  .anv-flow-in{ height:100%; background:#3B82F6; }
  .anv-flow-out{ height:100%; background:#22C55E; }
  .anv-flow-val{ width:62px; flex-shrink:0; text-align:right; font-size:0.7rem; color:var(--text-dim); }
  .anv-flow-legend{ display:flex; gap:16px; font-size:0.66rem; color:var(--text-dim); margin-top:4px; }
  .anv-flow-legend span{ display:inline-flex; align-items:center; gap:5px; }
  .anv-flow-legend i{ width:9px; height:9px; border-radius:2px; display:inline-block; }
  /* Drill-down calls */
  .anv-toolbar{ display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .anv-toolbar select{ border:1.5px solid var(--line); border-radius:7px; background:#fff; font-family:'Montserrat',sans-serif; font-size:0.74rem; padding:6px 9px; color:var(--black); }
  /* Per-call detail — full table, every column always visible (no click-to-expand) */
  .anv-calltable{ width:100%; border-collapse:collapse; font-size:0.72rem; background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
  .anv-calltable th,.anv-calltable td{ padding:7px 9px; text-align:left; border-bottom:1px solid var(--line); white-space:nowrap; }
  .anv-calltable th{ font-size:0.58rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-dim); background:var(--bg); position:sticky; top:0; }
  .anv-calltable th.num,.anv-calltable td.num{ text-align:right; }
  .anv-calltable tbody tr:last-child td{ border-bottom:none; }
  .anv-calltable tbody tr:hover td{ background:var(--bg); }
  .anv-calltable td.cost{ color:var(--brown-deep); font-weight:700; }
  /* Cost emphasis: dearest call red, second-dearest orange. */
  .anv-calltable td.cost-hi{ color:#C9302C; font-weight:800; }
  .anv-calltable td.cost-2nd{ color:#E0892E; font-weight:800; }
  .anv-calltable .anv-call-phase{ display:inline-block; }
  .anv-call-phase{ font-size:0.56rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:2px 7px; border-radius:9px; background:rgba(166,120,83,0.13); color:var(--brown-deep); white-space:nowrap; }
  .anv-prov-cell{ display:inline-flex; align-items:center; gap:6px; }
  .anv-prov-cell .dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  /* Compare conversations */
  .anv-cmp-pick{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .anv-cmp-pick-list{ max-height:260px; overflow-y:auto; margin:10px 0 14px; display:flex; flex-direction:column; gap:2px; }
  .anv-cmp-opt{ display:flex; align-items:flex-start; gap:10px; padding:9px 10px; border-radius:8px; cursor:pointer; font-size:0.78rem; }
  .anv-cmp-opt:hover{ background:var(--bg); }
  .anv-cmp-opt input{ flex-shrink:0; margin-top:3px; }
  .anv-cmp-optmain{ display:flex; flex-direction:column; gap:4px; min-width:0; flex:1; }
  .anv-cmp-optline{ display:flex; align-items:baseline; gap:8px; min-width:0; }
  .anv-cmp-opt .nm{ font-weight:600; color:var(--black); flex-shrink:0; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .anv-cmp-opt .sn{ color:var(--text-dim); font-size:0.7rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
  .anv-cmp-optmeta{ display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
  .anv-cmp-meta-lbl{ font-size:0.6rem; font-weight:700; color:var(--text-dim); display:inline-flex; align-items:center; gap:4px; }
  .anv-cmp-chip{ font-size:0.59rem; font-weight:700; letter-spacing:0.02em; padding:2px 7px; border-radius:9px; background:rgba(166,120,83,0.13); color:var(--brown-deep); white-space:nowrap; }
  .anv-cmp-chip.muted{ background:transparent; color:var(--text-dim); font-weight:600; border:1px dashed var(--line); }
  .anv-cmp-chip.pipe{ background:rgba(139,92,246,0.14); color:#7C4DD6; }
  .anv-cmp-chip.pipe.p1{ background:rgba(201,154,44,0.16); color:#9A7411; }
  .anv-cmp-opt.self{ background:rgba(166,120,83,0.08); }
  .anv-btn{ background:var(--brown-deep); border:none; color:#fff; font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.76rem; padding:9px 16px; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
  .anv-btn:hover{ background:var(--brown-mid); }
  .anv-btn:disabled{ opacity:0.5; cursor:default; }
  .anv-btn.ghost{ background:transparent; color:var(--brown-deep); border:1.5px solid var(--line); }
  .anv-cmp-table th.metric,.anv-cmp-table td.metric{ position:sticky; left:0; background:var(--bg); font-weight:700; z-index:1; }
  .anv-cmp-table td.hi{ background:rgba(166,120,83,0.16); font-weight:700; }
  .anv-cmp-table thead th{ vertical-align:bottom; }
  .anv-cmp-table thead th.self .anv-cmp-colname{ color:var(--brown-deep); }
  .anv-cmp-colname{ font-weight:700; color:var(--black); max-width:170px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .anv-cmp-collead{ font-size:0.62rem; color:var(--text-dim); font-weight:600; }
  .anv-cmp-legend{ font-size:0.66rem; color:var(--text-dim); margin-top:9px; display:flex; align-items:center; gap:7px; }
  .anv-cmp-legend .sw{ width:12px; height:12px; border-radius:3px; background:rgba(166,120,83,0.16); display:inline-block; }
  /* Insight cards */
  .anv-insights{ display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:11px; }
  .anv-insight{ background:var(--panel); border:1px solid var(--line); border-left:4px solid var(--brown-mid); border-radius:10px; padding:11px 13px; }
  .anv-insight .i-ico{ font-size:1rem; }
  .anv-insight .i-label{ font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-dim); margin-top:4px; }
  .anv-insight .i-val{ font-size:0.82rem; font-weight:700; color:var(--black); margin-top:3px; }
  @media (max-width:520px){ .anv-cards,.anv-insights{ grid-template-columns:1fr; } }
</style>
</head>
<body>
  <div id="shell">
    <header class="page-header">
      <div class="ph-icon"><i class="fas fa-comments"></i></div>
      <div class="ph-text">
        <h2>Conversation Logs</h2>
        <p>Client requirement chats &amp; generated drawings</p>
      </div>
      <div class="actions">
        <span class="count-pill" id="countPill"><i class="fas fa-circle-notch fa-spin"></i> Loading…</span>
        <button class="btn" id="refreshBtn"><i class="fas fa-rotate-right"></i> Refresh</button>
      </div>
    </header>
    <div id="app">
      <div class="left">
        <div class="list-head">
          <input id="search" type="text" placeholder="Search transcripts…" />
          <button class="btn select-toggle" id="selectModeBtn" style="display:none;" title="Select conversations to delete"><i class="fas fa-square-check"></i> Select</button>
        </div>
        <div class="bulk-bar" id="bulkBar">
          <label class="bulk-all"><input type="checkbox" id="selectAll" /> Select all</label>
          <button class="btn danger" id="deleteSel" disabled><i class="fas fa-trash"></i> Delete <span id="selCount"></span></button>
        </div>
        <div id="sessionList"></div>
      </div>
      <div class="right">
        <div class="detail-head" id="detailHead" style="display:none;"></div>
        <div id="detailBody">
          <div class="placeholder">
            <div class="icon-wrapper"><i class="fas fa-comments"></i></div>
            <h3>Select a conversation</h3>
            <p>Pick a session on the left to view the full transcript and the generated drawing dataset.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="logLightbox"><img id="logLightboxImg" src="" alt="Generated drawing full size" /></div>

  <!-- Conversation Analytics modal (admin-only; opened from the Analytics button) -->
  <div id="anvScrim"></div>
  <aside id="anvDrawer" role="dialog" aria-modal="true" aria-label="Conversation analytics" aria-hidden="true">
    <div class="anv-head">
      <div class="anv-ico"><i class="fas fa-chart-pie"></i></div>
      <div>
        <h3>Conversation Analytics</h3>
        <div class="anv-sub" id="anvSub">Usage, cost &amp; model breakdown</div>
      </div>
      <button class="anv-headbtn" id="anvCompareBtn" title="Compare with other conversations"><i class="fas fa-scale-balanced"></i> Compare</button>
      <button class="anv-close" id="anvClose" title="Close"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="anv-body" id="anvBody"></div>
  </aside>

  <!-- Conversation details modal (opened from the header hamburger menu) -->
  <div id="dtlScrim"></div>
  <aside id="dtlModal" role="dialog" aria-modal="true" aria-label="Conversation details" aria-hidden="true">
    <div class="dtl-head">
      <div class="dtl-ico"><i class="fas fa-circle-info"></i></div>
      <div>
        <h3>Conversation details</h3>
        <div class="dtl-sub">Session &amp; lead contact info</div>
      </div>
      <button class="dtl-close" id="dtlClose" title="Close"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="dtl-body"><div class="dtl-grid" id="dtlGrid"></div></div>
  </aside>

<script src="/cms.js"></script>
<script>
(function(){
  const esc = CMS.esc, fmt = CMS.fmt;
  // Shared analytics formatters/badges (same copy the admin dashboard uses).
  const { money, money4, costFull, compact, shortModel, fmtInt, fmtMs,
          colorFor, modelBadge, providerBadge, speedFor, PHASE_LABEL } = CMS;
  // Escape, then render the same tiny safe markdown subset the chat uses so
  // **bold** details show as real bold in the logs too. Only <strong>/<em> are
  // injected into already-escaped text, so this stays XSS-safe.
  function richText(text){
    let h = esc(String(text == null ? '' : text));
    h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
         .replace(/__([^_]+)__/g, '<strong>$1</strong>');
    h = h.replace(/(^|[^*])\*(?!\*)([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
    h = h.replace(/\*/g, '');
    return h;
  }
  const countPill = document.getElementById('countPill');
  const refreshBtn = document.getElementById('refreshBtn');
  const sessionList = document.getElementById('sessionList');
  const detailHead = document.getElementById('detailHead');
  const detailBody = document.getElementById('detailBody');
  const search = document.getElementById('search');
  const bulkBar = document.getElementById('bulkBar');
  const selectAll = document.getElementById('selectAll');
  const deleteSel = document.getElementById('deleteSel');
  const selCount = document.getElementById('selCount');
  const selectModeBtn = document.getElementById('selectModeBtn');

  // Multi-select state (admin only). Checkboxes + bulk bar only appear once the
  // "Select" toggle is on. `selected` holds the ticked session_ids; `filteredIds`
  // is the set currently shown (drives Select-all).
  let selectMode = false;
  const selected = new Set();
  let filteredIds = [];

  // Fullscreen image viewer for the generated drawing in the logs.
  const logLightbox = document.getElementById('logLightbox');
  const logLightboxImg = document.getElementById('logLightboxImg');
  function openLightbox(url){ if(!url) return; logLightboxImg.src = url; logLightbox.classList.add('show'); }
  function closeLightbox(){ logLightbox.classList.remove('show'); }
  logLightbox.addEventListener('click', closeLightbox);
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeLightbox(); });

  const TRIGGER_TAG = '[READY_TO_GENERATE]';

  // Admin-only: per-reply AI model tag in the transcript. Sales reps don't see
  // it. Resolved from the session before the first render (see init below).
  let isAdmin = false;
  const MODEL_NAMES = {
    'anthropic/claude-opus-4.6': 'Claude Opus 4.6',
    'anthropic/claude-sonnet-4.6': 'Claude Sonnet 4.6',
    'anthropic/claude-haiku-4.5': 'Claude Haiku 4.5',
    'openai/gpt-5.4': 'GPT-5.4',
    'google/gemini-3-pro-preview': 'Gemini 3 Pro',
    'google/gemini-2.5-flash': 'Gemini 2.5 Flash',
    'google/gemini-3-pro-image-preview': 'Nano Banana Pro',
    'google/gemini-3.1-flash-image-preview': 'Nano Banana 2',
    'google/gemini-2.5-flash-image': 'Nano Banana',
  };
  function friendlyModel(slug){
    if(!slug) return '';
    return MODEL_NAMES[slug] || String(slug).split('/').pop();
  }
  // Distinct model slugs recorded on a conversation's assistant replies. Lets the
  // compare picker preview which models a conversation used without an extra
  // fetch (the transcript already carries m.model on assistant messages).
  function modelsInSession(s){
    const set = new Set();
    (Array.isArray(s.messages) ? s.messages : []).forEach(m => {
      if(m && m.role !== 'user' && m.model) set.add(m.model);
    });
    return Array.from(set);
  }

  // Pipeline chip for the compare picker — derived from the per-call modes the
  // list endpoint attaches to each session (usage_events.mode). Pipeline 2 is the
  // 3-model split; Pipeline 1 is the single-model path.
  function pipelineChip(modes){
    if(!Array.isArray(modes) || !modes.length) return '';
    if(modes.length > 1) return '<span class="anv-cmp-chip pipe"><i class="fas fa-layer-group"></i> Mixed pipelines</span>';
    const m = Number(modes[0]);
    return m === 2
      ? '<span class="anv-cmp-chip pipe"><i class="fas fa-layer-group"></i> Pipeline 2 · 3-model</span>'
      : '<span class="anv-cmp-chip pipe p1"><i class="fas fa-microchip"></i> Pipeline 1 · single</span>';
  }

  // Deep-link target (set when opened via a conversation permalink).
  const deepId = new URLSearchParams(location.search).get('id');

  let sessions = [];
  let activeId = null;

  async function loadSessions(){
    countPill.classList.remove('err');
    countPill.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Loading…';
    sessionList.innerHTML = '<div class="list-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading conversations…</div>';
    try{
      const data = await CMS.get('/api/conversations?action=list');
      sessions = data.sessions || [];
      countPill.innerHTML = '<i class="fas fa-database"></i> ' + sessions.length + ' session' + (sessions.length === 1 ? '' : 's');
      renderList();
      // Open a conversation automatically once the list is in. A deep link
      // (e.g. a sales rep arriving from an email permalink) wins and opens that
      // exact conversation; otherwise, rather than leaving the pane blank, fall
      // back to the most recent session (list is ordered updated_at desc).
      if(!activeId){
        let target = null;
        if(deepId) target = sessions.find(s => s.session_id === deepId) || null;
        if(!target) target = sessions[0] || null;
        if(target){ activeId = target.session_id; renderList(); renderDetail(target); }
      }
    }catch(e){
      countPill.classList.add('err');
      countPill.innerHTML = '<i class="fas fa-triangle-exclamation"></i> Error';
      showError('Could not load logs', e.message || String(e));
    }
  }

  function firstUserMsg(s){
    const msgs = Array.isArray(s.messages) ? s.messages : [];
    const u = msgs.find(m => m.role === 'user');
    return u ? u.content : '(no client message yet)';
  }
  // Conversation name = the client's name (their email or a placeholder when no
  // name was captured). The subject line below it is the client's first message.
  function convName(s){
    return (s.client_name && s.client_name.trim())
        || (s.client_email && s.client_email.trim())
        || 'Unnamed client';
  }

  function renderList(){
    const q = search.value.trim().toLowerCase();
    const filtered = !q ? sessions : sessions.filter(s => {
      const blob = JSON.stringify(s.messages || '').toLowerCase() + ' ' + (s.txt_block || '').toLowerCase();
      return blob.includes(q);
    });
    if(!filtered.length){
      sessionList.innerHTML = '<div style="padding:20px;color:var(--text-dim);font-size:0.82rem;text-align:center;">No sessions' + (q ? ' match your search.' : ' recorded yet.') + '</div>';
      filteredIds = [];
      updateBulkUI();
      return;
    }
    sessionList.innerHTML = '';
    filtered.forEach(s => {
      const msgs = Array.isArray(s.messages) ? s.messages : [];
      const item = document.createElement('div');
      item.className = 'session-item' + (s.session_id === activeId ? ' active' : '');
      // Checkbox is admin-only and only while selection mode is on.
      const checkHtml = (isAdmin && selectMode)
        ? '<input type="checkbox" class="si-check" data-id="' + esc(s.session_id) + '"' + (selected.has(s.session_id) ? ' checked' : '') + ' />'
        : '';
      item.innerHTML =
        '<div class="si-top">' +
          '<span class="si-left">' + checkHtml + '<span class="si-time">' + esc(fmt(s.updated_at || s.created_at)) + '</span></span>' +
          '<span class="si-badges">' +
            '<span class="badge msgs">' + msgs.length + ' msg</span>' +
            (s.image_generated ? '<span class="badge img"><i class="fas fa-image"></i> img</span>' : '<span class="badge noimg">no img</span>') +
            (s.sent_to_sales ? '<span class="badge sales"><i class="fas fa-paper-plane"></i> sales</span>' : '') +
          '</span>' +
        '</div>' +
        '<div class="si-contact"><i class="fas fa-user"></i> ' + esc(convName(s)) + '</div>' +
        '<div class="si-snippet">' + esc(firstUserMsg(s)) + '</div>';
      // Checkbox toggles selection without opening the conversation.
      const cb = item.querySelector('.si-check');
      if(cb){
        cb.addEventListener('click', e => e.stopPropagation());
        cb.addEventListener('change', () => {
          if(cb.checked) selected.add(s.session_id); else selected.delete(s.session_id);
          updateBulkUI();
        });
      }
      item.addEventListener('click', () => { activeId = s.session_id; renderList(); renderDetail(s); });
      sessionList.appendChild(item);
    });
    filteredIds = filtered.map(s => s.session_id);
    updateBulkUI();
  }

  // Reflect selection state in the bulk bar. The "Select" toggle itself is shown
  // to admins; the bulk bar + checkboxes only appear while selection mode is on.
  function updateBulkUI(){
    selectModeBtn.style.display = isAdmin ? '' : 'none';
    const on = isAdmin && selectMode;
    bulkBar.classList.toggle('show', on);
    if(!on) return;
    const n = selected.size;
    selCount.textContent = n ? '(' + n + ')' : '';
    deleteSel.disabled = n === 0;
    const allSel = filteredIds.length > 0 && filteredIds.every(id => selected.has(id));
    selectAll.checked = allSel;
    selectAll.indeterminate = !allSel && filteredIds.some(id => selected.has(id));
  }

  function resetDetail(){
    detailHead.style.display = 'none';
    detailBody.innerHTML =
      '<div class="placeholder">' +
        '<div class="icon-wrapper"><i class="fas fa-comments"></i></div>' +
        '<h3>Select a conversation</h3>' +
        '<p>Pick a session on the left to view the full transcript and the generated drawing dataset.</p>' +
      '</div>';
  }

  function renderDetail(s){
    const msgs = Array.isArray(s.messages) ? s.messages : [];
    const permalink = location.origin + '/cms/conversations/' + encodeURIComponent(s.session_id);

    // Session metadata + lead contact details — tucked behind the Details toggle
    // so the header stays clean (title + actions only).
    const metaRows = [
      ['Started', esc(fmt(s.created_at))],
      ['Updated', esc(fmt(s.updated_at))],
      ['Messages', String(msgs.length)],
      ['Image', s.image_generated ? 'yes' : 'no'],
      ['Sales', s.sent_to_sales ? ('yes, ' + esc(fmt(s.sent_to_sales_at))) : 'no'],
      ['Session ID', esc((s.session_id || '').slice(0, 8))],
    ];
    if(s.client_email) metaRows.push(['Email', esc(s.client_email)]);
    if(s.client_phone) metaRows.push(['Phone', esc(s.client_phone)]);
    if(s.client_location) metaRows.push(['Location', esc(s.client_location)]);

    detailHead.style.display = 'block';
    detailHead.innerHTML =
      '<div class="dh-row">' +
        '<div class="dh-titlewrap">' +
          '<div class="dh-name"><i class="fas fa-user"></i>' + esc(convName(s)) + '</div>' +
          '<div class="dh-subject">' + esc(firstUserMsg(s)) + '</div>' +
        '</div>' +
        '<div class="dh-actions">' +
          '<button class="btn send-sales" id="sendSales"><i class="fas fa-paper-plane"></i> ' +
            (s.sent_to_sales ? 'Resend to sales' : 'Send to sales') + '</button>' +
          '<div class="dh-dropdown">' +
            '<button class="btn dh-burger" id="dhBurger" title="More actions" aria-label="More actions"><i class="fas fa-bars"></i></button>' +
            '<div class="dh-menu hidden" id="dhMenu">' +
              '<button id="copyLink"><i class="fas fa-link"></i> Copy link</button>' +
              (isAdmin ? '<button id="analyticsBtn"><i class="fas fa-chart-pie"></i> Analytics</button>' : '') +
              '<button id="detailsBtn"><i class="fas fa-circle-info"></i> Details</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="dh-sendresult" id="sendResult" style="display:none;"></div>';

    let html = '<div class="transcript">';
    if(!msgs.length){
      html += '<div style="color:var(--text-dim);text-align:center;">No messages in this session.</div>';
    } else {
      msgs.forEach(m => {
        const role = m.role === 'user' ? 'user' : 'assistant';
        const who = role === 'user' ? 'CLIENT' : 'ASSISTANT';
        const content = String(m.content || '').replace(TRIGGER_TAG, '').trim();
        // Admin-only AI model tag on assistant replies that recorded a model.
        let tag = '';
        if(isAdmin && role === 'assistant' && m.model){
          tag = '<span class="ai-tag">AI · ' + esc(friendlyModel(m.model)) + '</span>';
        }
        html += '<div class="msg ' + role + '"><span class="who">' + who + tag + '</span>' + richText(content) + '</div>';
      });
    }
    html += '</div>';

    if(s.image_url){
      html += '<div class="image-wrap"><div class="image-label"><i class="fas fa-image"></i> Generated drawing</div>' +
        '<img class="gen-image" src="' + esc(s.image_url) + '" alt="Generated CAD drawing" title="Open full size" /></div>';
    }
    if(s.txt_block){
      html += '<div class="txtblock-wrap">' +
        '<div class="txtblock-head">' +
          '<button class="txtblock-toggle" id="txtToggle"><i class="fas fa-file-lines"></i> Generated txt block</button>' +
          '<button class="txtblock-copy" id="txtCopy" style="display:none;"><i class="fas fa-copy"></i> Copy</button>' +
        '</div>' +
        '<pre class="txtblock" id="txtPre" style="display:none;">' + esc(s.txt_block) + '</pre></div>';
    }
    detailBody.innerHTML = html;

    // Hamburger menu: Copy link / Analytics / Details. Toggle on the burger;
    // close on outside click or after picking an item.
    const dhBurger = document.getElementById('dhBurger');
    const dhMenu = document.getElementById('dhMenu');
    const closeDhMenu = () => { if(dhMenu) dhMenu.classList.add('hidden'); };
    if(dhBurger) dhBurger.addEventListener('click', (e) => {
      e.stopPropagation();
      dhMenu.classList.toggle('hidden');
    });
    document.addEventListener('click', closeDhMenu);

    const copyBtn = document.getElementById('copyLink');
    if(copyBtn) copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(permalink).then(() => {
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied';
        setTimeout(() => { copyBtn.innerHTML = '<i class="fas fa-link"></i> Copy link'; closeDhMenu(); }, 1100);
      });
    });

    // Analytics drawer (admin-only): per-conversation usage/cost breakdown.
    const analyticsBtn = document.getElementById('analyticsBtn');
    if(analyticsBtn) analyticsBtn.addEventListener('click', () => { closeDhMenu(); openAnalytics(s.session_id, convName(s)); });

    // Details: open the metadata modal (rebuilt from metaRows each time).
    const detailsBtn = document.getElementById('detailsBtn');
    if(detailsBtn) detailsBtn.addEventListener('click', () => {
      closeDhMenu();
      const grid = document.getElementById('dtlGrid');
      if(grid) grid.innerHTML = metaRows.map(function(r){ return '<div class="m">' + r[0] + '<b>' + r[1] + '</b></div>'; }).join('');
      openDetailsModal();
    });

    // Manual sales handoff: flags the session and fires the same server-side
    // email (notifySales → WP mail relay) the public widget uses. Surfaces the
    // REAL send result — on success it also shows the recipient the email went
    // to; if no recipient is configured, it says exactly that.
    const sendBtn = document.getElementById('sendSales');
    if(sendBtn) sendBtn.addEventListener('click', async () => {
      const original = sendBtn.innerHTML;
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Sending…';
      try{
        const res = await CMS.send('POST', '/api/conversations?action=sendToSales', { sessionId: s.session_id });
        const n = res.notification || {};
        // Reflect the flag locally so the badge + button label update live.
        s.sent_to_sales = true;
        s.sent_to_sales_at = new Date().toISOString();
        const row = sessions.find(x => x.session_id === s.session_id);
        if(row){ row.sent_to_sales = true; row.sent_to_sales_at = s.sent_to_sales_at; }
        if(n.sent){
          CMS.toast('Sent to sales — email delivered.', 'ok');
        } else {
          CMS.toast(n.error || 'Flagged for sales, but the email was not sent.', 'err');
        }
        renderList();
        renderDetail(s);   // rebuilds the header (button now reads "Resend to sales")
        // renderDetail recreated #sendResult — populate it with the outcome.
        const sr = document.getElementById('sendResult');
        if(sr){
          if(n.sent){
            sr.className = 'dh-sendresult';
            sr.innerHTML = '<i class="fas fa-circle-check"></i> Email sent to ' + esc(n.recipient || 'the sales team') + '.';
          } else {
            sr.className = 'dh-sendresult err';
            sr.innerHTML = '<i class="fas fa-triangle-exclamation"></i> ' + esc(n.error || 'Flagged for sales, but the email was not sent.');
          }
          sr.style.display = 'flex';
        }
      }catch(e){
        CMS.toast(e.message || 'Could not send to sales.', 'err');
        sendBtn.disabled = false;
        sendBtn.innerHTML = original;
      }
    });

    const toggle = document.getElementById('txtToggle');
    if(toggle) toggle.addEventListener('click', () => {
      const pre = document.getElementById('txtPre');
      const shown = pre.style.display === 'none';
      pre.style.display = shown ? 'block' : 'none';
      const copy = document.getElementById('txtCopy');
      if(copy) copy.style.display = shown ? 'inline-flex' : 'none';
    });
    // Copy the full generated prompt (the raw txt block) to the clipboard.
    const txtCopy = document.getElementById('txtCopy');
    if(txtCopy) txtCopy.addEventListener('click', () => {
      navigator.clipboard.writeText(s.txt_block || '').then(() => {
        txtCopy.innerHTML = '<i class="fas fa-check"></i> Copied';
        setTimeout(() => { txtCopy.innerHTML = '<i class="fas fa-copy"></i> Copy'; }, 1500);
      });
    });
    const genImg = detailBody.querySelector('.gen-image');
    if(genImg) genImg.addEventListener('click', () => openLightbox(s.image_url));
  }

  function showError(title, detail){
    detailHead.style.display = 'none';
    detailBody.innerHTML =
      '<div class="placeholder error">' +
        '<div class="icon-wrapper" style="background:linear-gradient(135deg,#C9302C,#e2584d);"><i class="fas fa-triangle-exclamation"></i></div>' +
        '<h3>' + esc(title) + '</h3><pre>' + esc(detail) + '</pre></div>';
  }

  // ════════════ Conversation details modal ════════════
  const dtlScrim = document.getElementById('dtlScrim');
  const dtlModal = document.getElementById('dtlModal');
  const dtlClose = document.getElementById('dtlClose');
  function openDetailsModal(){ dtlScrim.classList.add('open'); dtlModal.classList.add('open'); dtlModal.setAttribute('aria-hidden','false'); }
  function closeDetailsModal(){ dtlScrim.classList.remove('open'); dtlModal.classList.remove('open'); dtlModal.setAttribute('aria-hidden','true'); }
  dtlClose.addEventListener('click', closeDetailsModal);
  dtlScrim.addEventListener('click', closeDetailsModal);
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && dtlModal.classList.contains('open')) closeDetailsModal(); });

  // ════════════ Conversation Analytics drawer (admin-only) ════════════
  const anvScrim = document.getElementById('anvScrim');
  const anvDrawer = document.getElementById('anvDrawer');
  const anvBody = document.getElementById('anvBody');
  const anvSub = document.getElementById('anvSub');
  const anvClose = document.getElementById('anvClose');
  const anvCompareBtn = document.getElementById('anvCompareBtn');
  let anvData = null;
  let anvSort = { key:'tokens', dir:'desc' };   // model-table sort
  let anvFilter = '';                            // drill-down model filter
  let anvSessionId = null, anvSessionName = '';  // the conversation the drawer opened on
  let anvCmpData = [];                           // [{ id, name, data }] for the compare view
  const ANV_CALL_CAP = 200;                      // cap drill-down rows (very long convos)

  function openAnalyticsDrawer(){ anvScrim.classList.add('open'); anvDrawer.classList.add('open'); anvDrawer.setAttribute('aria-hidden','false'); }
  function closeAnalytics(){ anvScrim.classList.remove('open'); anvDrawer.classList.remove('open'); anvDrawer.setAttribute('aria-hidden','true'); anvCompareBtn.classList.remove('active'); }
  anvClose.addEventListener('click', closeAnalytics);
  anvScrim.addEventListener('click', closeAnalytics);
  anvCompareBtn.addEventListener('click', renderComparePicker);
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && anvDrawer.classList.contains('open')) closeAnalytics(); });

  async function openAnalytics(sessionId, name){
    anvSort = { key:'tokens', dir:'desc' }; anvFilter = ''; anvData = null;
    anvSessionId = sessionId; anvSessionName = name || '';
    anvCompareBtn.classList.remove('active');
    anvSub.textContent = name ? ('Usage for ' + name) : 'Usage, cost & model breakdown';
    anvBody.innerHTML = '<div class="anv-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading usage…</div>';
    openAnalyticsDrawer();
    try{
      anvData = await CMS.get('/api/conversations?action=analytics&id=' + encodeURIComponent(sessionId));
      renderAnalytics();
    }catch(e){
      anvBody.innerHTML = '<div class="anv-warn">' + esc(e.message || 'Could not load analytics.') + '</div>';
    }
  }

  function fmtDur(ms){
    if(ms == null) return '—';
    const s = Math.round(ms/1000);
    if(s < 60) return s + 's';
    const m = Math.floor(s/60), sec = s % 60;
    if(m < 60) return m + 'm' + (sec ? (' ' + sec + 's') : '');
    const h = Math.floor(m/60), min = m % 60;
    return h + 'h' + (min ? (' ' + min + 'm') : '');
  }
  // A model can route to several upstream providers (e.g. deepseek via Cloudflare,
  // GMICloud, …), so the provider cell is derived from this model's actual calls.
  function providersForModel(model){
    const set = new Set();
    (anvData.events || []).forEach(r => { if(r.model === model && r.provider) set.add(r.provider); });
    return Array.from(set);
  }
  // Per-card accent: [solid color, translucent icon-chip bg, FontAwesome icon].
  function anvCard(label, big, sub, accent){
    const a = accent || ['var(--brown-mid)', 'rgba(166,120,83,0.14)', 'fa-circle'];
    const ico = '<span class="anv-card-ico" style="background:' + a[1] + ';color:' + a[0] + ';"><i class="fas ' + a[2] + '"></i></span>';
    return '<div class="anv-card" style="border-top-color:' + a[0] + ';">' +
      '<div class="anv-card-head">' + ico + '<div class="anv-card-label">' + label + '</div></div>' +
      '<div class="anv-card-big">' + big + '</div><div class="anv-card-sub">' + (sub || '') + '</div></div>';
  }

  function renderAnalytics(){
    const d = anvData;
    if(d.needsMigration){
      anvBody.innerHTML = '<div class="anv-warn"><b>Usage table needs the latest columns.</b> Run the <code>usage_events</code> migration in Supabase, then refresh. New AI calls record automatically once it exists.</div>';
      return;
    }
    const events = d.events || [];
    if(!events.length){
      anvBody.innerHTML = '<div class="anv-empty"><i class="fas fa-chart-pie"></i>' +
        '<div>No usage recorded for this conversation.</div>' +
        '<div style="font-size:0.74rem;">It may predate usage logging, or no AI calls were billed to this session.</div></div>';
      return;
    }
    const t = d.total || {};
    const bm = d.byModel || [];
    const totTok = t.tokens || 0;
    const mostUsed = bm.slice().sort((a,b)=>b.tokens-a.tokens)[0];
    // Which pipeline(s) ran this conversation (pipeline_mode at call time).
    const modes = Array.from(new Set(events.map(r=>r.mode).filter(v=>v!=null))).sort();
    const PIPE_SUB = { 1: 'Single model', 2: '3-model pipeline' };
    const pipeTxt = modes.length===0 ? '—'
      : modes.length===1 ? ('Pipeline ' + modes[0])
      : ('Mixed · ' + modes.map(m=>'P'+m).join(', '));
    const pipeSub = modes.length===1 ? (PIPE_SUB[modes[0]] || '') : (modes.length>1 ? 'multiple pipelines' : '');

    let h = '<div class="anv-section" style="margin-top:4px;"><div class="anv-cards">';
    h += anvCard('Total tokens', compact(totTok), fmtInt(t.input||0) + ' in · ' + fmtInt(t.output||0) + ' out', ['#3B82F6','rgba(59,130,246,0.13)','fa-coins']);
    h += anvCard('Total cost', money(t.cost||0), money4(t.calls ? t.cost/t.calls : 0) + ' avg/call', ['#C99A2C','rgba(201,154,44,0.16)','fa-sack-dollar']);
    h += anvCard('AI calls', fmtInt(t.calls||0), bm.length + ' model' + (bm.length===1?'':'s'), ['#22C55E','rgba(34,197,94,0.14)','fa-comments']);
    h += anvCard('Pipeline', pipeTxt, pipeSub, ['#8B5CF6','rgba(139,92,246,0.14)','fa-layer-group']);
    h += anvCard('Duration', fmtDur(d.duration && d.duration.ms), d.duration ? fmt(d.duration.first) : '—', ['#0EA5A4','rgba(14,165,164,0.14)','fa-clock']);
    h += anvCard('Avg tokens/call', t.calls ? compact(Math.round(totTok/t.calls)) : '—', 'across the conversation', ['#E0892E','rgba(224,137,46,0.14)','fa-gauge']);
    h += anvCard('Most-used model', mostUsed ? modelBadge(mostUsed.model) : '—', mostUsed ? (compact(mostUsed.tokens) + ' tok') : '', ['#A67853','rgba(166,120,83,0.16)','fa-star']);
    h += anvCard('Peak call', d.peak ? compact(d.peak.tokens) + ' tok' : '—', d.peak ? fmt(d.peak.created_at) : '', ['#E0526D','rgba(224,82,109,0.14)','fa-arrow-trend-up']);
    h += '</div></div>';

    h += modelTable() + tokenFlow() + drillDown() + insightsSection();
    anvBody.innerHTML = h;
    wireAnalytics();
  }

  function modelTable(){
    const bm = (anvData.byModel || []).slice();
    const t = anvData.total || {};
    const totTok = t.tokens || 0;
    const topModel = bm.slice().sort((a,b)=>b.tokens-a.tokens)[0];  // highlight (by tokens)
    const k = anvSort.key;
    bm.sort((a,b)=>{
      let av, bv;
      if(k==='model'){ av = shortModel(a.model); bv = shortModel(b.model); }
      else if(k==='provider'){ av = providersForModel(a.model).join(); bv = providersForModel(b.model).join(); }
      else if(k==='pct'){ av = a.tokens; bv = b.tokens; }
      else { av = Number(a[k])||0; bv = Number(b[k])||0; }
      const r = av<bv?-1:av>bv?1:0; return anvSort.dir==='asc'?r:-r;
    });
    const arrow = key => anvSort.key===key ? (anvSort.dir==='asc'?'▲':'▼') : '';
    const cols = [['model','Model',0],['provider','Provider',0],['prompt_tokens','Input',1],['completion_tokens','Output',1],['tokens','Total',1],['cost','Cost',1],['pct','%',1]];
    let h = '<div class="anv-section"><div class="anv-section-label"><i class="fas fa-table-list"></i> Model breakdown</div>';
    h += '<div style="overflow-x:auto;"><table class="anv-table" id="anvModelTable"><thead><tr>' +
      cols.map(c=>'<th class="sortable' + (c[2]?' num':'') + '" data-k="' + c[0] + '">' + c[1] + ' <span class="ar">' + arrow(c[0]) + '</span></th>').join('') +
      '</tr></thead><tbody>';
    h += bm.map(m=>{
      const provs = providersForModel(m.model);
      const provCell = provs.length===0 ? '<span style="color:var(--text-dim)">—</span>'
        : provs.length===1 ? providerBadge(provs[0])
        : '<span style="color:var(--text-dim)">' + provs.length + ' providers</span>';
      const pct = totTok ? Math.round(m.tokens/totTok*100) : 0;
      return '<tr' + (topModel && m.model===topModel.model ? ' class="anv-top"' : '') + '>' +
        '<td>' + modelBadge(m.model) + '</td>' +
        '<td>' + provCell + '</td>' +
        '<td class="num">' + fmtInt(m.prompt_tokens) + '</td>' +
        '<td class="num">' + fmtInt(m.completion_tokens) + '</td>' +
        '<td class="num">' + compact(m.tokens) + '</td>' +
        '<td class="num">' + costFull(m.cost) + '</td>' +
        '<td class="num">' + pct + '%</td></tr>';
    }).join('');
    h += '<tr class="anv-totals"><td>Total</td><td></td>' +
      '<td class="num">' + fmtInt(t.input||0) + '</td><td class="num">' + fmtInt(t.output||0) + '</td>' +
      '<td class="num">' + compact(totTok) + '</td><td class="num">' + costFull(t.cost||0) + '</td><td class="num">100%</td></tr>';
    h += '</tbody></table></div></div>';
    return h;
  }

  function tokenFlow(){
    const bm = (anvData.byModel || []).slice().sort((a,b)=>b.tokens-a.tokens);
    const max = Math.max.apply(null, bm.map(m=>m.tokens).concat([1]));
    let h = '<div class="anv-section"><div class="anv-section-label"><i class="fas fa-arrows-left-right"></i> Token flow (input vs output)</div>';
    h += bm.map(m=>{
      const w = Math.max(Math.round(m.tokens/max*100), 2);
      const inPct = m.tokens ? (m.prompt_tokens/m.tokens*100) : 0;
      return '<div class="anv-flow-row">' +
        '<div class="anv-flow-name">' + modelBadge(m.model) + '</div>' +
        '<div class="anv-flow-wrap"><div class="anv-flow-track" style="width:' + w + '%">' +
          '<div class="anv-flow-in" style="width:' + inPct + '%" title="Input ' + fmtInt(m.prompt_tokens) + '"></div>' +
          '<div class="anv-flow-out" style="width:' + (100-inPct) + '%" title="Output ' + fmtInt(m.completion_tokens) + '"></div>' +
        '</div></div>' +
        '<div class="anv-flow-val">' + compact(m.tokens) + '</div></div>';
    }).join('');
    h += '<div class="anv-flow-legend"><span><i style="background:#3B82F6"></i> Input</span><span><i style="background:#22C55E"></i> Output</span></div></div>';
    return h;
  }

  // Per-call detail: a full table with every column visible at once — no
  // click-to-expand. The wider modal accommodates all columns; long convos
  // scroll the table body (capped at ANV_CALL_CAP rows).
  function drillDown(){
    const all = anvData.events || [];
    const models = Array.from(new Set(all.map(r=>r.model)));
    const rows = anvFilter ? all.filter(r=>r.model===anvFilter) : all;
    const shown = rows.slice(0, ANV_CALL_CAP);
    const capped = rows.length > ANV_CALL_CAP;
    let h = '<div class="anv-section"><div class="anv-section-label"><i class="fas fa-list-ul"></i> Per-call detail</div>';
    h += '<div class="anv-toolbar"><select id="anvCallFilter"><option value="">All models</option>' +
      models.map(m=>'<option value="' + esc(m) + '"' + (anvFilter===m?' selected':'') + '>' + esc(shortModel(m)) + '</option>').join('') + '</select>' +
      '<span style="font-size:0.68rem;color:var(--text-dim);margin-left:auto;">' + shown.length + (capped ? (' of ' + rows.length) : '') + ' call' + (rows.length===1?'':'s') + '</span></div>';
    const cols = ['Time','Phase','Model','Provider','Input','Output','Total','Latency','Speed','Pipeline','Finish','Cost'];
    const numCol = { Input:1, Output:1, Total:1, Latency:1, Speed:1, Cost:1 };
    // Highlight the two most expensive calls shown: dearest red, runner-up orange.
    const costRanks = Array.from(new Set(shown.map(r=>Number(r.cost)||0).filter(c=>c>0))).sort((a,b)=>b-a);
    const costHi = costRanks[0], cost2nd = costRanks[1];
    h += '<div style="overflow-x:auto;"><table class="anv-calltable"><thead><tr>' +
      cols.map(c=>'<th' + (numCol[c]?' class="num"':'') + '>' + c + '</th>').join('') +
      '</tr></thead><tbody>';
    h += shown.map(r=>{
      const total = Number(r.total_tokens) || ((Number(r.prompt_tokens)||0) + (Number(r.completion_tokens)||0));
      const sp = speedFor(r);
      const provCell = r.provider
        ? '<span class="anv-prov-cell"><span class="dot" style="background:' + colorFor('prov:' + r.provider) + '"></span>' + esc(r.provider) + '</span>'
        : '<span style="color:var(--text-dim)">—</span>';
      const rc = Number(r.cost)||0;
      const costCls = (rc>0 && rc===costHi) ? ' cost-hi' : (rc>0 && rc===cost2nd) ? ' cost-2nd' : '';
      return '<tr>' +
        '<td>' + esc(fmt(r.created_at)) + '</td>' +
        '<td><span class="anv-call-phase">' + esc(PHASE_LABEL[r.phase] || r.phase || '—') + '</span></td>' +
        '<td>' + modelBadge(r.model) + '</td>' +
        '<td>' + provCell + '</td>' +
        '<td class="num">' + fmtInt(r.prompt_tokens) + '</td>' +
        '<td class="num">' + fmtInt(r.completion_tokens) + '</td>' +
        '<td class="num">' + compact(total) + '</td>' +
        '<td class="num">' + fmtMs(r.latency_ms) + '</td>' +
        '<td class="num">' + (sp!=null ? sp.toFixed(1) + ' tok/s' : '—') + '</td>' +
        '<td>' + (r.mode!=null ? ('Pipeline ' + r.mode) : '—') + '</td>' +
        '<td>' + esc(r.finish_reason||'—') + '</td>' +
        '<td class="num cost' + costCls + '">' + costFull(r.cost) + '</td>' +
        '</tr>';
    }).join('');
    h += '</tbody></table></div></div>';
    return h;
  }

  function insightsSection(){
    const events = anvData.events || [];
    const bm = anvData.byModel || [];
    const perf = anvData.performance || {};
    const t = anvData.total || {};
    if(!events.length) return '';
    const dearestCall = events.slice().sort((a,b)=>(Number(b.cost)||0)-(Number(a.cost)||0))[0];
    const per1k = m => m.tokens ? m.cost/m.tokens*1000 : Infinity;
    const withTok = bm.filter(m=>m.tokens>0);
    const cheapest = withTok.length ? withTok.reduce((a,b)=>per1k(b)<per1k(a)?b:a) : null;
    const effRatio = t.input ? (t.output/t.input) : null;
    const ins = (icon,color,label,val)=>'<div class="anv-insight" style="border-left-color:' + color + ';"><div class="i-ico" style="color:' + color + ';"><i class="fas ' + icon + '"></i></div><div class="i-label">' + label + '</div><div class="i-val">' + val + '</div></div>';
    let h = '<div class="anv-section"><div class="anv-section-label"><i class="fas fa-lightbulb"></i> Cost &amp; performance</div><div class="anv-insights">';
    h += ins('fa-sack-dollar','#C9302C','Most expensive call', dearestCall ? (costFull(dearestCall.cost) + ' · ' + esc(shortModel(dearestCall.model))) : '—');
    h += ins('fa-money-bill-trend-up','#22C55E','Most efficient model', cheapest ? (esc(shortModel(cheapest.model)) + ' · ' + money4(per1k(cheapest)) + '/1K') : '—');
    h += ins('fa-scale-balanced','#8B5CF6','Efficiency ratio', effRatio!=null ? (effRatio.toFixed(2) + ' out/in') : '—');
    h += ins('fa-bolt','#E0892E','Avg latency', perf.avgLatencyMs!=null ? fmtMs(perf.avgLatencyMs) : 'not recorded');
    h += ins('fa-gauge-high','#3B82F6','Fastest call', perf.fastest ? (esc(shortModel(perf.fastest.model)) + ' · ' + fmtMs(perf.fastest.ms)) : '—');
    h += ins('fa-hourglass-half','#0EA5A4','Slowest call', perf.slowest ? (esc(shortModel(perf.slowest.model)) + ' · ' + fmtMs(perf.slowest.ms)) : '—');
    h += '</div></div>';
    return h;
  }

  function wireAnalytics(){
    document.querySelectorAll('#anvModelTable th.sortable').forEach(th=>{
      th.addEventListener('click', ()=>{
        const k = th.dataset.k;
        if(anvSort.key===k) anvSort.dir = anvSort.dir==='asc'?'desc':'asc';
        else { anvSort.key = k; anvSort.dir = (k==='model'||k==='provider') ? 'asc' : 'desc'; }
        renderAnalytics();
      });
    });
    const f = document.getElementById('anvCallFilter');
    if(f) f.addEventListener('change', ()=>{ anvFilter = f.value; renderAnalytics(); });
  }

  // ════════════ Compare conversations ════════════
  // Stacks several conversations' usage side-by-side. Reuses the single-session
  // analytics endpoint (one fetch per conversation) so the API stays unchanged.
  // The candidate list is the page's already-loaded `sessions`.
  function renderComparePicker(){
    anvCompareBtn.classList.add('active');
    anvSub.textContent = 'Compare conversations';
    const items = sessions || [];
    if(!items.length){
      anvBody.innerHTML = '<div class="anv-empty"><i class="fas fa-scale-balanced"></i><div>No conversations available to compare.</div></div>';
      return;
    }
    const opts = items.map(s=>{
      const id = s.session_id;
      const isSelf = id === anvSessionId;
      const models = modelsInSession(s);
      const chips = models.length
        ? models.map(m=>'<span class="anv-cmp-chip">' + esc(friendlyModel(m)) + '</span>').join('')
        : '<span class="anv-cmp-chip muted">no model recorded</span>';
      const pipeChip = pipelineChip(s.modes);
      const msgs = Array.isArray(s.messages) ? s.messages.length : 0;
      return '<label class="anv-cmp-opt' + (isSelf?' self':'') + '">' +
        '<input type="checkbox" class="anv-cmp-cb" value="' + esc(id) + '"' + (isSelf?' checked':'') + ' />' +
        '<span class="anv-cmp-optmain">' +
          '<span class="anv-cmp-optline"><span class="nm">' + esc(convName(s)) + '</span><span class="sn">' + esc(firstUserMsg(s)) + '</span></span>' +
          '<span class="anv-cmp-optmeta"><span class="anv-cmp-meta-lbl"><i class="fas fa-comment"></i> ' + msgs + ' msg</span>' + pipeChip + chips + '</span>' +
        '</span>' +
      '</label>';
    }).join('');
    anvBody.innerHTML =
      '<div class="anv-cmp-pick">' +
        '<div class="anv-section-label" style="margin-bottom:4px;"><i class="fas fa-scale-balanced"></i> Pick conversations to compare</div>' +
        '<div style="font-size:0.74rem;color:var(--text-dim);">Select 2 or more — usage is fetched for each and shown side-by-side. Each row previews the models that conversation used; the pipeline (recorded per AI call) appears in the comparison.</div>' +
        '<div class="anv-cmp-pick-list">' + opts + '</div>' +
        '<div style="display:flex;gap:10px;align-items:center;">' +
          '<button class="anv-btn" id="anvCmpGo"><i class="fas fa-scale-balanced"></i> Compare selected</button>' +
          (anvSessionId ? '<button class="anv-btn ghost" id="anvCmpBack">Back to this conversation</button>' : '') +
          '<span id="anvCmpCount" style="font-size:0.72rem;color:var(--text-dim);margin-left:auto;"></span>' +
        '</div>' +
      '</div>';
    const cbs = ()=>Array.from(anvBody.querySelectorAll('.anv-cmp-cb'));
    const upd = ()=>{
      const n = cbs().filter(c=>c.checked).length;
      document.getElementById('anvCmpCount').textContent = n + ' selected';
      document.getElementById('anvCmpGo').disabled = n < 2;
    };
    cbs().forEach(c=>c.addEventListener('change', upd));
    upd();
    document.getElementById('anvCmpGo').addEventListener('click', ()=>{
      runCompare(cbs().filter(c=>c.checked).map(c=>c.value));
    });
    const back = document.getElementById('anvCmpBack');
    if(back) back.addEventListener('click', ()=>{
      anvCompareBtn.classList.remove('active');
      anvSub.textContent = anvSessionName ? ('Usage for ' + anvSessionName) : 'Usage, cost & model breakdown';
      if(anvData) renderAnalytics(); else openAnalytics(anvSessionId, anvSessionName);
    });
  }

  async function runCompare(ids){
    anvSub.textContent = 'Comparing ' + ids.length + ' conversations';
    anvBody.innerHTML = '<div class="anv-loading"><i class="fas fa-circle-notch fa-spin"></i> Loading usage for ' + ids.length + ' conversations…</div>';
    try{
      anvCmpData = await Promise.all(ids.map(async id=>{
        const data = await CMS.get('/api/conversations?action=analytics&id=' + encodeURIComponent(id));
        const s = (sessions||[]).find(x=>x.session_id===id);
        return { id, name: s ? convName(s) : id.slice(0,8), data };
      }));
      renderCompare();
    }catch(e){
      anvBody.innerHTML = '<div class="anv-warn">' + esc(e.message || 'Could not load comparison.') + '</div>';
    }
  }

  function renderCompare(){
    const cols = anvCmpData;
    // Each metric: [label, fn(data) -> [sortNum|null, html]]. sortNum drives the
    // per-row "highest value" highlight; null opts the row out of highlighting.
    const metrics = [
      ['Total tokens',    d => { const v=(d.total&&d.total.tokens)||0; return [v, compact(v)]; }],
      ['Input tokens',    d => { const v=(d.total&&d.total.input)||0;  return [v, fmtInt(v)]; }],
      ['Output tokens',   d => { const v=(d.total&&d.total.output)||0; return [v, fmtInt(v)]; }],
      ['Total cost',      d => { const v=(d.total&&d.total.cost)||0;   return [v, money(v)]; }],
      ['AI calls',        d => { const v=(d.total&&d.total.calls)||0;  return [v, fmtInt(v)]; }],
      ['Avg tokens/call', d => { const t=d.total||{}; const v=t.calls?Math.round((t.tokens||0)/t.calls):0; return [v, compact(v)]; }],
      ['Avg cost/call',   d => { const t=d.total||{}; const v=t.calls?(t.cost||0)/t.calls:0; return [v, money4(v)]; }],
      ['Pipeline',        d => {
        const modes = Array.from(new Set((d.events||[]).map(r=>r.mode).filter(v=>v!=null))).sort();
        const txt = modes.length===0 ? '—'
          : modes.length===1 ? ('Pipeline ' + modes[0] + (modes[0]===2 ? ' · 3-model' : ' · single'))
          : ('Mixed · ' + modes.map(m=>'P'+m).join(', '));
        return [null, txt];
      }],
      ['Models used',     d => { const v=(d.byModel||[]).length; return [v, String(v)]; }],
      ['Most-used model', d => { const bm=(d.byModel||[]).slice().sort((a,b)=>b.tokens-a.tokens)[0]; return [null, bm?modelBadge(bm.model):'—']; }],
      ['Duration',        d => { const v=d.duration&&d.duration.ms; return [v||0, fmtDur(v)]; }],
      ['Avg latency',     d => { const v=d.performance&&d.performance.avgLatencyMs; return [v==null?null:Number(v), v!=null?fmtMs(v):'—']; }],
      ['Peak call',       d => { const v=d.peak&&d.peak.tokens; return [v||0, v!=null?compact(v)+' tok':'—']; }],
    ];
    let h = '<div class="anv-section" style="margin-top:6px;"><div class="anv-section-label"><i class="fas fa-scale-balanced"></i> Conversation comparison</div>';
    h += '<div style="overflow-x:auto;"><table class="anv-table anv-cmp-table"><thead><tr>' +
      '<th class="metric">Metric</th>' +
      cols.map(c=>'<th' + (c.id===anvSessionId?' class="self"':'') + '><div class="anv-cmp-colname" title="' + esc(c.name) + '">' + esc(c.name) + (c.id===anvSessionId?' ★':'') + '</div>' +
        '<div class="anv-cmp-collead">' + ((c.data.total&&c.data.total.calls)||0) + ' calls</div></th>').join('') +
      '</tr></thead><tbody>';
    h += metrics.map(m=>{
      const cells = cols.map(c=>m[1](c.data));   // [sortNum, html]
      const nums = cells.map(x=>x[0]);
      const valid = nums.filter(n=>n!=null && !isNaN(n));
      const max = valid.length ? Math.max.apply(null, valid) : null;
      const spread = new Set(valid).size > 1;   // only highlight when values differ
      return '<tr><td class="metric">' + m[0] + '</td>' +
        cells.map((x,i)=>'<td class="num' + (spread && max!=null && nums[i]===max ? ' hi':'') + '">' + x[1] + '</td>').join('') +
      '</tr>';
    }).join('');
    h += '</tbody></table></div>';
    h += '<div class="anv-cmp-legend"><span class="sw"></span> highest value in the row · ★ = this conversation · ' +
      '<a href="#" id="anvCmpEdit" style="color:var(--brown-deep);font-weight:600;">change selection</a></div>';
    h += '</div>';
    anvBody.innerHTML = h;
    const edit = document.getElementById('anvCmpEdit');
    if(edit) edit.addEventListener('click', e=>{ e.preventDefault(); renderComparePicker(); });
  }

  refreshBtn.addEventListener('click', loadSessions);
  search.addEventListener('input', renderList);

  // "Select" toggle: reveals/hides the per-row checkboxes + bulk-delete bar.
  selectModeBtn.addEventListener('click', () => {
    selectMode = !selectMode;
    selectModeBtn.classList.toggle('active', selectMode);
    selectModeBtn.innerHTML = selectMode
      ? '<i class="fas fa-xmark"></i> Cancel'
      : '<i class="fas fa-square-check"></i> Select';
    if(!selectMode) selected.clear();
    renderList();
  });

  // Select-all toggles every session currently shown (respects the search filter).
  selectAll.addEventListener('change', () => {
    if(selectAll.checked) filteredIds.forEach(id => selected.add(id));
    else filteredIds.forEach(id => selected.delete(id));
    renderList();
  });

  // Bulk delete the ticked sessions (admin-only endpoint).
  deleteSel.addEventListener('click', async () => {
    const ids = Array.from(selected);
    if(!ids.length) return;
    if(!confirm('Delete ' + ids.length + ' conversation' + (ids.length === 1 ? '' : 's') + '? This cannot be undone.')) return;
    const original = deleteSel.innerHTML;
    deleteSel.disabled = true;
    deleteSel.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Deleting…';
    try{
      const res = await CMS.send('POST', '/api/conversations?action=delete', { sessionIds: ids });
      const n = res.deleted || ids.length;
      CMS.toast('Deleted ' + n + ' conversation' + (n === 1 ? '' : 's') + '.', 'ok');
      if(activeId && selected.has(activeId)){ activeId = null; resetDetail(); }
      selected.clear();
      await loadSessions();
    }catch(e){
      CMS.toast(e.message || 'Could not delete.', 'err');
      deleteSel.innerHTML = original;
      deleteSel.disabled = false;
    }
  });

  // Resolve the signed-in role first so the admin-only model tags render on the
  // initial transcript; then load the sessions. (Falls back to non-admin if the
  // session check fails, so the tag never leaks to sales by accident.)
  CMS.session()
    .then(s => { isAdmin = !!(s && s.authenticated && s.role === 'admin'); })
    .catch(() => { isAdmin = false; })
    .finally(loadSessions);
})();
</script>
</body>
</html>
