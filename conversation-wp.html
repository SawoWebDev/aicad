     SAWO CAD Generator — WordPress / Avada embed block
     ─────────────────────────────────────────────────────────────────────────
     📋 PASTE-INTO-WORDPRESS NOTE:
     You can paste this ENTIRE file directly into WordPress as-is — drop it into
     an Avada "Code Block" element (or the WP "Custom HTML" block). No edits
     needed; it works immediately as a ready-to-paste code block.

     ℹ️  SINGLE SOURCE: this same file is also served at /conversation-wp.html and
     embedded in the CMS "CAD Generator" iframe (vercel/app.html), so there is
     only ONE generator UI to maintain — edit this file and both places update.

     It is fully self-contained: scoped CSS (everything lives under #sawocad-app
     so it can't clobber the theme), the chat + preview UI, a centered "CAD
     Generator" label, and the chat→drawing pipeline JS.

     • The app sits in a softly tinted wrapper card (not raw white-on-white)
       so it reads as a designed module on the page rather than a void.
     • Both panel headers are solid brown fills (not hairline underlines) so
       the brand color actually distributes across the layout instead of
       collecting only in the title text and one border.
     • API calls go cross-origin to the deployed CMS backend (CORS is open: the
       API sends Access-Control-Allow-Origin: *). Change SAWO_API_BASE below if
       you deploy the backend to a different domain.

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
  /* All selectors are scoped to #sawocad-app so nothing leaks into the theme. */
  #sawocad-app{
    /* single brand brown used everywhere, plus tints/shades derived from it */
    --brown: #AF8564;
    --brown-deep: #8C6444;   /* shade, for headers/text that need more contrast */
    --brown-mid: #AF8564;
    --brown-light: #C9A584;  /* tint, for soft fills */
    --brown-tint: #F3EBE2;   /* pale wash for backgrounds */
    --black: #141617;
    --panel: #ffffff;
    --soft: #FBF6EF;
    --wrap: #F1E6D8;         /* outer wrapper tint, distinct from page white */
    --line: #e7ddd2;
    --text-dim: #8a7c6e;

    font-family: 'Montserrat', sans-serif !important;
    color: var(--black);
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    gap: 22px;
    min-height: 82vh;
    /* a quiet warm gradient wrapper so the widget isn't a white block on a
       white page — gives the brown somewhere to breathe outside the cards */
    padding: 34px clamp(14px, 4vw, 34px) 40px;
    border-radius: 22px;
  }
  #sawocad-app *{ box-sizing: border-box; }

  /* ── Centered label ── */
  #sawocad-app .sc-title{
    text-align: center;
  }
  #sawocad-app .sc-title .sc-badge{
    display: inline-flex; align-items: center; gap: 10px;
    padding: 9px 20px; border-radius: 30px;
    background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%);
    border: none;
    box-shadow: 0 10px 26px rgba(140,100,68,0.28);
  }
  #sawocad-app .sc-title .sc-badge i{ color: #fff; font-size: 1.05rem; }
  #sawocad-app .sc-title h2{
    margin: 0; font-size: 1.35rem; font-weight: 800; letter-spacing: 0.4px;
    color: var(--brown-deep);
  }

  /* ── App grid: conversation + preview ── */
  #sawocad-app .sc-grid{
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 22px;
    height: 800px;
  }
  #sawocad-app .sc-col{
    display: flex; flex-direction: column; min-height: 0;
    background: var(--panel);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 16px 44px rgba(140,100,68,0.14);
  }

  /* Solid brown header fill — this is the main fix: color now lives in a
     real block at the top of each panel, not a 1px hairline. */
  #sawocad-app .sc-col-head{
    display: flex; align-items: center; gap: 10px;
    padding: 15px 18px; flex-shrink: 0;
    font-size: 0.76rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em;
    color: #fff;
    background: linear-gradient(120deg, var(--brown-deep) 0%, var(--brown-mid) 100%);
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  #sawocad-app .sc-col-head i{ color: rgba(255,255,255,0.85); }
  /* "New chat" / clear button on the conversation header */
  #sawocad-app .sc-col-head .sc-clear{
    margin-left: auto; display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Montserrat', sans-serif !important;
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: #fff; background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.35);
    padding: 5px 10px; border-radius: 7px; cursor: pointer; transition: background 0.2s;
  }
  #sawocad-app .sc-col-head .sc-clear i{ color: #fff; }
  #sawocad-app .sc-col-head .sc-clear:hover{ background: rgba(255,255,255,0.30); }

  /* ── Chat ── */
  #sawocad-app #sc-chatThread{
    flex: 1; overflow-y: auto; min-height: 0;
    padding: 18px; display: flex; flex-direction: column; gap: 12px;
    background: var(--soft);
  }
  #sawocad-app #sc-chatThread::-webkit-scrollbar{ width: 7px; }
  #sawocad-app #sc-chatThread::-webkit-scrollbar-thumb{ background: var(--brown-light); border-radius: 4px; }
  #sawocad-app .sc-msg{
    padding: 11px 14px; max-width: 92%;
    white-space: pre-wrap; word-break: break-word;
    border-radius: 12px; font-size: 0.86rem; line-height: 1.55;
  }
  #sawocad-app .sc-msg.bot{
    align-self: flex-start; background: #fff;
    border-left: 4px solid var(--brown-mid);
    box-shadow: 0 5px 15px rgba(140,100,68,0.10); border-top-left-radius: 4px;
  }
  #sawocad-app .sc-msg.user{
    align-self: flex-end;
    background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%);
    color: #fff; box-shadow: 0 6px 18px rgba(140,100,68,0.28); border-top-right-radius: 4px;
  }
  #sawocad-app .sc-msg.sys{
    align-self: center; background: var(--brown-tint); text-align: center;
    font-size: 0.76rem; color: var(--brown-deep); max-width: 100%; padding: 6px 14px;
    border-radius: 20px; font-weight: 600;
  }
  #sawocad-app .sc-msg .who{
    display: block; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; margin-bottom: 4px;
  }
  #sawocad-app .sc-msg.bot .who{ color: var(--brown-mid); }
  #sawocad-app .sc-msg.user .who{ color: rgba(255,255,255,0.8); }

  /* Per-reply AI provenance tag — CMS-only debug aid. Rendered inline after the
     "ASSISTANT" label so staff can tell a real model reply (with its model name)
     apart from a scripted/canned message. Hidden entirely on the WordPress paste
     (only injected when running inside the CMS iframe). */
  #sawocad-app .sc-msg .who .sc-ai-tag{
    display: inline-block; margin-left: 8px; vertical-align: middle;
    font-size: 0.56rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 1px 7px; border-radius: 10px; line-height: 1.6;
  }
  #sawocad-app .sc-msg .who .sc-ai-tag.ai{
    background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%);
    color: #fff;
  }
  #sawocad-app .sc-msg .who .sc-ai-tag.scripted{
    background: transparent; color: var(--text-dim); border: 1px solid var(--line);
  }

  /* Typing indicator shown while the assistant is preparing a reply */
  #sawocad-app .sc-typing{ display: inline-flex; align-items: center; gap: 5px; padding: 3px 2px; }
  #sawocad-app .sc-typing span{
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--brown-mid); opacity: 0.4;
    animation: sc-typing-bounce 1.2s infinite ease-in-out both;
  }
  #sawocad-app .sc-typing span:nth-child(2){ animation-delay: 0.15s; }
  #sawocad-app .sc-typing span:nth-child(3){ animation-delay: 0.3s; }
  @keyframes sc-typing-bounce{
    0%, 80%, 100%{ transform: translateY(0); opacity: 0.4; }
    40%{ transform: translateY(-5px); opacity: 1; }
  }

  #sawocad-app .sc-input-row{
    border-top: 1px solid var(--line);
    padding: 14px; display: flex; gap: 10px; align-items: center; flex-shrink: 0;
    background: var(--panel);
  }
  #sawocad-app #sc-chatInput{
    flex: 1; border: 1.5px solid var(--line); border-radius: 9px;
    background: var(--soft); color: var(--black);
    font-family: 'Montserrat', sans-serif !important; font-size: 0.88rem;
    height: 44px; min-height: 44px; max-height: 140px; resize: none;
    padding: 11px 14px; line-height: 20px;
    outline: none; transition: border-color 0.2s, background 0.2s; overflow-y: auto;
  }
  #sawocad-app #sc-chatInput:focus{ border-color: var(--brown-mid); background: #fff; }
  #sawocad-app #sc-sendBtn{
    border: 2px solid transparent; border-radius: 9px;
    background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%);
    color: #fff; font-family: 'Montserrat', sans-serif !important; font-size: 0.95rem;
    cursor: pointer; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; padding: 0;
    box-shadow: 0 6px 16px rgba(140,100,68,0.30);
    transition: all 0.3s ease;
  }
  #sawocad-app #sc-sendBtn:hover{ background: #fff; color: var(--brown-deep); border-color: var(--brown-mid); }
  #sawocad-app #sc-sendBtn:disabled{ background: var(--line); color: var(--text-dim); border-color: var(--line); cursor: not-allowed; box-shadow: none; }

  /* ── Preview / output ── */
  #sawocad-app #sc-output{
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 28px; overflow: auto; min-height: 0;
    /* a deeper, slightly patterned ground so the empty state has presence
       instead of reading as a flat blank rectangle */
    background:
      radial-gradient(circle at 50% 38%, rgba(175,133,100,0.07), transparent 60%),
      repeating-linear-gradient(135deg, rgba(140,100,68,0.035) 0px, rgba(140,100,68,0.035) 1px, transparent 1px, transparent 14px),
      var(--soft);
  }
  #sawocad-app .sc-empty{ text-align: center; max-width: 360px; }
  #sawocad-app .sc-empty .sc-iconw{
    width: 92px; height: 92px; border-radius: 50%;
    background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%);
    display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
    box-shadow: 0 14px 34px rgba(140,100,68,0.40), inset 0 2px 4px rgba(255,255,255,0.3);
  }
  #sawocad-app .sc-empty .sc-iconw i{ font-size: 2.3rem; color: #fff; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
  #sawocad-app .sc-empty h3{ font-size: 1.15rem; font-weight: 700; margin: 0 0 8px; color: var(--brown-deep); font-family: 'Montserrat', sans-serif !important; }
  #sawocad-app .sc-empty p{ font-size: 0.85rem; color: var(--text-dim); line-height: 1.6; margin: 0; }

  #sawocad-app .sc-frame{
    border: 1px solid var(--line); border-radius: 12px; overflow: hidden; max-width: 100%;
    box-shadow: 0 20px 55px rgba(140,100,68,0.22); background:#fff;
  }
  #sawocad-app .sc-frame img{ display: block; max-width: 100%; max-height: 70vh; cursor: zoom-in; }

  #sawocad-app .sc-error{
    text-align: center; max-width: 440px; white-space: pre-wrap;
    color: #C9302C; font-size: 0.88rem; line-height: 1.6;
  }
  #sawocad-app .sc-error .err-icon{ font-size: 2rem; margin-bottom: 12px; display: block; }

  /* scan animation */
  #sawocad-app .sc-scan-wrap{ text-align: center; }
  #sawocad-app .sc-scan{
    width: 320px; max-width: 70vw; height: 210px; border: 1px solid var(--line);
    border-radius: 12px; position: relative; overflow: hidden; margin: 0 auto 16px;
    background: #fff; box-shadow: 0 10px 30px rgba(140,100,68,0.16);
  }
  #sawocad-app .sc-scan::before{
    content: ""; position: absolute; left: 0; right: 0; height: 2px;
    background: var(--brown); box-shadow: 0 0 14px 2px rgba(175,133,100,0.7);
    animation: sc-scanmove 1.6s ease-in-out infinite;
  }
  @keyframes sc-scanmove{ 0%{ top: 0; } 50%{ top: calc(100% - 2px); } 100%{ top: 0; } }
  #sawocad-app .sc-scan-label{
    font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--brown-deep);
  }
  #sawocad-app .sc-scan-progress{
    width: 320px; max-width: 70vw; height: 8px; margin: 14px auto 8px;
    background: var(--line); border-radius: 6px; overflow: hidden;
  }
  #sawocad-app .sc-scan-progress-fill{
    height: 100%; width: 0%; border-radius: 6px;
    background: linear-gradient(90deg, var(--brown-mid) 0%, var(--brown-light) 100%); transition: width 0.3s ease;
  }
  #sawocad-app .sc-scan-pct{
    font-size: 0.78rem; font-weight: 700; color: var(--brown-deep); letter-spacing: 0.04em;
  }

  #sawocad-app .sc-out-actions{
    border-top: 1px solid var(--line); padding: 12px 16px; flex-shrink: 0; display: none; background: var(--panel);
  }
  #sawocad-app .sc-out-actions.visible{ display: block; }
  #sawocad-app #sc-downloadBtn{
    border: 2px solid var(--brown-mid); border-radius: 8px; background: transparent; color: var(--brown-deep);
    font-family: 'Montserrat', sans-serif !important; font-weight: 600; font-size: 0.8rem; letter-spacing: 0.04em;
    text-transform: uppercase; padding: 9px 16px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s ease;
  }
  #sawocad-app #sc-downloadBtn:hover{ background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%); color: #fff; border-color: transparent; }

  #sawocad-app ::placeholder{ color: #b8a89a; }

  /* lightbox (fixed overlay over the whole page) */
  #sc-lightbox{
    position: fixed; inset: 0; background: rgba(20,22,23,0.92);
    display: none; align-items: center; justify-content: center; z-index: 99999; padding: 28px; cursor: zoom-out;
  }
  #sc-lightbox.visible{ display: flex; }
  #sc-lightbox img{ max-width: 100%; max-height: 100%; border: 2px solid #A67853; border-radius: 8px; }

  @media (max-width: 900px){
    #sawocad-app .sc-grid{ grid-template-columns: 1fr; height: auto; }
    #sawocad-app .sc-col{ height: 560px; }
  }
</style>

<div id="sawocad-app">

  <div class="sc-grid">
    <!-- conversation -->
    <div class="sc-col">

</div>

<div id="sc-lightbox"><img id="sc-lightboxImg" src="" alt="Generated drawing full size" /></div>

    if(!resp.ok) throw new Error(data && data.error ? data.error : ('HTTP ' + resp.status));
    if(!data.content) throw new Error('No reply content returned.');
    // `model` is the slug the server actually used; callers use it to label the
    // reply. Falls back to the phase-based guess if an older API omits it.
    return { content: data.content, model: data.model || modelForPhase(phase || 'converse') };
  }

  async function callImageModel(fullPrompt){
    const resp = await fetch(SAWO_API_BASE + '/api/openrouter?type=image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: fullPrompt, sessionId })
    });
    const raw = await resp.text();
    let data;
    try{ data = JSON.parse(raw); }
    catch(e){ throw new Error('Non-JSON response from server (HTTP ' + resp.status + ').'); }
    if(!resp.ok) throw new Error(data && data.error ? data.error : ('HTTP ' + resp.status));
    if(!data.imageUrl) throw new Error('Model responded but no image was found in the result. Try rephrasing the brief.');
    return data.imageUrl;
  }

  function renderEmpty(){
    output.innerHTML =
      '<div class="sc-empty">' +
        '<div class="sc-iconw"><i class="fas fa-image"></i></div>' +
        '<h3>Generated drawings appear here</h3>' +
        '<p>Describe your sauna in the chat — your technical drawing is generated automatically once the assistant has enough detail and you confirm.</p>' +
      '</div>';
    outActions.classList.remove('visible');
    currentImageUrl = null;
  }
  function renderScan(label){
    output.innerHTML = '<div class="sc-scan-wrap"><div class="sc-scan"></div><div class="sc-scan-label">' + label + '</div>' +
      '<div class="sc-scan-progress"><div class="sc-scan-progress-fill" id="sc-scanFill"></div></div>' +
      '<div class="sc-scan-pct" id="sc-scanPct">0%</div></div>';
    outActions.classList.remove('visible');
    setProgress(progValue);
  }

  // Simulated progress bar: the image API returns no progress events, so ease
  // toward ~90% while we wait, then snap to 100% on completion.
  function setProgress(p){
    progValue = p;
    const fill = document.getElementById('sc-scanFill');
    const pct = document.getElementById('sc-scanPct');
    if(fill) fill.style.width = p + '%';
    if(pct) pct.textContent = Math.round(p) + '%';
  }
  function startProgress(){
    stopProgress();
    setProgress(0);
    const start = Date.now();
    progTimer = setInterval(() => {
      const t = (Date.now() - start) / 1000;        // seconds elapsed
      const target = 97;
      const eased = target * (1 - Math.exp(-t / 9)); // smooth ramp from 0, never a hard stop
      setProgress(Math.max(progValue, Math.min(target, eased)));
    }, 200);
  }
  function finishProgress(){ stopProgress(); setProgress(100); }
  function stopProgress(){ if(progTimer){ clearInterval(progTimer); progTimer = null; } }
  function renderError(message){
    output.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'sc-error';
    const ic = document.createElement('i');
    ic.className = 'fas fa-triangle-exclamation err-icon';
    div.appendChild(ic);
    div.appendChild(document.createTextNode('Generation failed:\n\n' + message));
    output.appendChild(div);
    outActions.classList.remove('visible');
  }
  function renderImage(url){
    currentImageUrl = url;
    output.innerHTML = '';
    const frame = document.createElement('div');
    frame.className = 'sc-frame';
    const img = document.createElement('img');
    img.src = url;
    img.alt = 'Generated technical CAD drawing';
    img.addEventListener('click', () => openLightbox(url));
    frame.appendChild(img);
    output.appendChild(frame);
    outActions.classList.add('visible');
  }

  function openLightbox(url){ lightboxImg.src = url; lightbox.classList.add('visible'); }
  function closeLightbox(){ lightbox.classList.remove('visible'); }
  lightbox.addEventListener('click', closeLightbox);
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && lightbox.classList.contains('visible')) closeLightbox(); });

  downloadBtn.addEventListener('click', () => {
    if(!currentImageUrl) return;
    const a = document.createElement('a');
    a.href = currentImageUrl;
    a.download = 'cad-drawing.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
  });

  async function runPipeline(){
    try{
      setActiveModel('analyze');
      renderScan('Generating drawing dataset…');
      startProgress();
      const conversationDump = history.map(m => (m.role === 'user' ? 'CLIENT: ' : 'ASSISTANT: ') + m.content).join('\n\n');
      const { content: reply } = await callChatModel(
        [{ role: 'user', content: 'Here is the full conversation so far:\n\n' + conversationDump + '\n\nProduce the final txt block now, following the reference template structure exactly, using the gathered sauna measurements/door type and placing any accessories under REMARKS.' }],
        TXTBLOCK_SYSTEM_PROMPT,
        'analyze'
      );
      let txtBlock = reply.trim();
      const trigger = 'Generate the complete technical CAD drawing canvas image now.';
      if(!txtBlock.includes(trigger)){ txtBlock += '\n\n' + trigger; }
      loggedTxtBlock = txtBlock;
      logSession();

      setActiveModel('image');
      renderScan('Rendering technical drawing…');
      const fullPrompt = IMAGE_SYSTEM_PREFIX + txtBlock;
      const imageUrl = await callImageModel(fullPrompt);

      finishProgress();
      renderImage(imageUrl);
      addSysMsg('Drawing generated.');
      setActiveModel('converse');
      loggedImageGenerated = true;
      loggedImageUrl = imageUrl;
      logSession();

      promptSendToSales();
    } catch(err){
      stopProgress();
      renderError(err.message || String(err));
      addSysMsg('Error: ' + (err.message || String(err)));
    }
  }

  function promptSendToSales(){
    if(salesPrompted) return;
    salesPrompted = true;
    const wrap = document.createElement('div');
    wrap.className = 'sc-msg bot';
    // Scripted prompt — tag it NOT AI in the CMS only (matches other scripted bubbles).
    const salesTag = isEmbedded ? '<span class="sc-ai-tag scripted">NOT AI</span>' : '';
    wrap.innerHTML =
      '<span class="who">ASSISTANT' + salesTag + '</span>' +
      'Would you like to send this drawing to our sales team for a follow-up?' +
      '<div style="margin-top:10px; display:flex; gap:8px;">' +
        '<button type="button" id="sc-sales-yes" style="border:2px solid transparent;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:0.8rem;padding:7px 16px;background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%);color:#fff;">Yes, send to sales</button>' +
        '<button type="button" id="sc-sales-no" style="border:1.5px solid var(--line);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:0.8rem;padding:7px 16px;background:transparent;color:var(--brown-deep);">No, thanks</button>' +
      '</div>';
    chatThread.appendChild(wrap);
    chatThread.scrollTop = chatThread.scrollHeight;

    const yes = wrap.querySelector('#sc-sales-yes');
    const no = wrap.querySelector('#sc-sales-no');
    const disable = () => { yes.disabled = true; no.disabled = true; yes.style.opacity = no.style.opacity = '0.5'; };
    no.addEventListener('click', () => { disable(); addSysMsg('No problem — not sent to sales.'); });
    yes.addEventListener('click', async () => {
      disable();
      try{
        const resp = await fetch(SAWO_API_BASE + '/api/conversations?action=sendToSales', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });
        if(!resp.ok){ const e = await resp.json().catch(()=>({})); throw new Error(e.error || ('HTTP ' + resp.status)); }
        addSysMsg('Sent to sales — they’ll be in touch. ✓');
      }catch(err){ addSysMsg('Could not notify sales: ' + (err.message || String(err))); }
    });
  }

  // ── Lead capture (AI-driven) ──
  // The model runs the whole name/email/phone/country intake conversationally:
  // it acknowledges the client's message, asks for one field at a time, rejects
  // junk answers, and signals completion with a [LEAD_CAPTURED] {json} line. We
  // re-validate the email/phone here before accepting and handing off to the
  // sauna assistant, so a stray tag can never push bad data through.
  const LEAD_TAG = '[LEAD_CAPTURED]';
  function parseLeadTag(reply){
    const idx = reply.indexOf(LEAD_TAG);
    if(idx === -1) return { visible: reply.trim(), captured: null };
    const visible = reply.slice(0, idx).trim();
    const m = reply.slice(idx + LEAD_TAG.length).match(/\{[\s\S]*\}/);
    let captured = null;
    if(m){ try{ captured = JSON.parse(m[0]); }catch(e){ captured = null; } }
    return { visible, captured };
  }
  function leadIsValid(c){
    // Phone is optional now; country is required. Still validate phone if given.
    if(!(c && String(c.name || '').trim() && isValidEmail(c.email) && String(c.location || '').trim())) return false;
    const phone = String(c.phone || '').trim();
    return phone === '' || isValidPhone(phone);
  }

  async function runLeadCapture(){
    if(busy) return;
    busy = true;
    sendBtn.disabled = true;

    setActiveModel('converse');
    const typingEl = addTyping();
    try{
      const { content: reply, model } = await callChatModel(history, LEAD_SYSTEM_PROMPT, 'converse');
      typingEl.remove();
      const { visible, captured } = parseLeadTag(reply);
      const done = leadIsValid(captured);

      // Show the spoken part (never the raw tag); record it tag-stripped so the
      // captured JSON never leaks into the transcript or the sauna model context.
      if(visible) addMsg('bot', visible, { ai: true, model: friendlyModel(model) });
      // Persist the model slug on the message so the admin log viewer can show
      // which AI produced each reply. (Stripped before being sent to OpenRouter.)
      if(visible) history.push({ role: 'assistant', content: visible, model: model });

      if(done){
        lead.name = String(captured.name).trim();
        lead.email = String(captured.email).trim();
        lead.phone = String(captured.phone).trim();
        lead.location = String(captured.location || '').trim();
        leadStage = 'done';
        // Safety net: the intake reply is meant to ask the first sauna question
        // before its tag. If it emitted only the tag (no spoken text), make sure
        // the client is still prompted so the handoff never stalls silently.
        if(!visible){
          const opener = 'Thanks, I have your details. Now, what are the overall outer dimensions of the sauna room - width, depth, and height in millimetres?';
          addMsg('bot', opener, { ai: true, model: friendlyModel(model) });
          history.push({ role: 'assistant', content: opener, model: model });
        }
      }
      logSession();
      // No follow-up model call here: the intake's final reply already asks the
      // first sauna question, so we wait for the client's answer. From here every
      // turn goes through runAssistant, with the history always ending on a user
      // message (valid role alternation) — which avoids the empty-reply error.
    } catch(err){
      typingEl.remove();
      addSysMsg('Error: ' + (err.message || String(err)));
    } finally {
      busy = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  // ── Assistant turn (model call + ready-to-generate trigger) ──
  async function runAssistant(){
    if(busy) return;
    busy = true;
    sendBtn.disabled = true;

    setActiveModel('converse');
    const typingEl = addTyping();
    try{
      const { content: reply, model } = await callChatModel(history, SYSTEM_PROMPT, 'converse');
      typingEl.remove();
      const TRIGGER_TAG = '[READY_TO_GENERATE]';
      const triggered = reply.includes(TRIGGER_TAG);
      const cleaned = reply.replace(TRIGGER_TAG, '').trim();
      if(cleaned) addMsg('bot', cleaned, { ai: true, model: friendlyModel(model) });
      history.push({ role: 'assistant', content: reply, model: model });
      logSession();
      if(triggered){ await runPipeline(); }
    } catch(err){
      typingEl.remove();
      addSysMsg('Error: ' + (err.message || String(err)));
    } finally {
      busy = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  async function sendChat(){
    if(busy) return;
    const text = chatInput.value.trim();
    if(!text) return;

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    chatInput.value = '';

    // Collect the client's contact details before the sauna conversation begins.
    if(leadStage !== 'done'){
      logSession();
      await runLeadCapture();
      return;
    }

    await runAssistant();
  }

  sendBtn.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendChat(); }
  });

  // Clear / new conversation.
  const clearBtn = document.getElementById('sc-clearBtn');
  if(clearBtn) clearBtn.addEventListener('click', () => {
    const hasConvo = history.some(m => m && m.role === 'user');
    if(hasConvo && !confirm('Clear this conversation and start over?')) return;
    clearConversation();
  });

  renderEmpty();
  // Restore a saved conversation (CMS) if one exists; otherwise start fresh.
  const saved = loadState();
  if(saved && Array.isArray(saved.history) && saved.history.length){
    restoreState(saved);
  } else {
    initChat();
  }
  loadModelConfig();
})();
</script>
