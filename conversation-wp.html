<style>

    color: var(--black);
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    gap: 22px;
    min-height: 82vh;

    padding: 34px clamp(14px, 4vw, 34px) 40px;

  #sawocad-app .sc-title{

    gap: 22px;

  }
  #sawocad-app .sc-col{
    display: flex; flex-direction: column; min-height: 0;
    background: var(--panel);

    color: #fff;

  #sawocad-app .sc-col-head i{ color: rgba(255,255,255,0.85); }

  #sawocad-app .sc-col-head .sc-clear{

    font-family: 'Montserrat', sans-serif !important;

    color: #fff; background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.35);

  #sawocad-app .sc-msg.bot{

  #sawocad-app .sc-msg.user{

    background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%);

    padding: 1px 7px; border-radius: 10px; line-height: 1.6;

  #sawocad-app #sc-sendBtn{

  @keyframes sc-scanmove{ 0%{ top: 0; } 50%{ top: calc(100% - 2px); } 100%{ top: 0; } }
  #sawocad-app .sc-scan-label{

  #sawocad-app .sc-scan-progress{

  #sawocad-app .sc-scan-pct{
    font-size: 0.78rem; font-weight: 700; color: var(--brown-deep); letter-spacing: 0.04em;

  #sawocad-app .sc-scan svg{ position: absolute; inset: 0; width: 100%; height: 100%; display: block; z-index: 1; }
  #sawocad-app .sc-grid-bg{ stroke: #ece4da; stroke-width: 0.5; }
  #sawocad-app .sc-ln{
    fill: none; stroke: #243140; stroke-width: 1.3; stroke-linecap: round; stroke-linejoin: round;

  }
  #sawocad-app .sc-ln.thin{ stroke: #51708d; stroke-width: 0.9; }
  #sawocad-app .sc-ln.dim{ stroke: #b06a3a; stroke-width: 0.8; }
  #sawocad-app .sc-num{
    fill: #b06a3a; font-family: 'Courier New', monospace; font-size: 8px; font-weight: 700;
    opacity: 0; animation: sc-fade 0.5s ease forwards;
  }
  #sawocad-app .sc-lbl{
    fill: #243140; font-family: 'Courier New', monospace; font-size: 6.5px; letter-spacing: 0.04em;
    opacity: 0; animation: sc-fade 0.5s ease forwards;
  }
  @keyframes sc-draw{ to{ stroke-dashoffset: 0; } }
  @keyframes sc-fade{ to{ opacity: 1; } }

  #sawocad-app .sc-col-head #sc-downloadBtn{
    margin-left: auto; display: none; align-items: center; gap: 6px;
    font-family: 'Montserrat', sans-serif !important;
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: #fff; background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.35);

  }
  #sawocad-app .sc-col-head #sc-downloadBtn.visible{ display: inline-flex; }
  #sawocad-app .sc-col-head #sc-downloadBtn i{ color: #fff; }
  #sawocad-app .sc-col-head #sc-downloadBtn:hover{ background: rgba(255,255,255,0.30); }

  #sawocad-app ::placeholder{ color: #b8a89a; }

  #sc-lightbox{
    position: fixed; inset: 0; background: rgba(20,22,23,0.92);
    display: none; align-items: center; justify-content: center; z-index: 99999; padding: 28px; cursor: zoom-out;
  }
  #sc-lightbox.visible{ display: flex; }
  #sc-lightbox img{ max-width: 100%; max-height: 100%; border: 2px solid #A67853; border-radius: 8px; }

  @media (max-width: 900px){
    #sawocad-app .sc-grid{ grid-template-columns: 1fr; height: auto; }
    #sawocad-app .sc-col{ height: 560px; }
  }
</style>

  function escapeHtml(s){

  function renderRich(text){

    h = h.replace(/(^|[^*])\*(?!\*)([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');

  async function callChatModel(messages, systemPrompt, phase){

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, systemPrompt, phase: phase || 'converse', sessionId })
    });
    const raw = await resp.text();
    let data;
    try{ data = JSON.parse(raw); }
    catch(e){ throw new Error('Non-JSON response (HTTP ' + resp.status + ').'); }
    if(!resp.ok) throw new Error(data && data.error ? data.error : ('HTTP ' + resp.status));
    if(!data.content) throw new Error('No reply content returned.');
    recordUsage(data.usage);

    return { content: data.content, model: data.model || modelForPhase(phase || 'converse') };
  }

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: fullPrompt, sessionId })
    });
    const raw = await resp.text();
    let data;
    try{ data = JSON.parse(raw); }
    catch(e){ throw new Error('Non-JSON response from server (HTTP ' + resp.status + ').'); }
    if(!resp.ok) throw new Error(data && data.error ? data.error : ('HTTP ' + resp.status));
    if(!data.imageUrl) throw new Error('Model responded but no image was found in the result. Try rephrasing the brief.');
    recordUsage(data.usage);
    return data.imageUrl;
  }

      '<rect x="0" y="0" width="320" height="210" fill="url(#scGrid)"/>' +

      '<rect class="sc-ln" pathLength="1" x="40" y="55" width="150" height="115" style="animation-delay:.1s"/>' +

      '<rect class="sc-ln" pathLength="1" x="46" y="138" width="138" height="26" style="animation-delay:1.1s"/>' +

      '<path class="sc-ln thin" pathLength="1" d="M150 170 A28 28 0 0 0 150 142" fill="none" style="animation-delay:2.2s"/>' +
      '<line class="sc-ln thin" pathLength="1" x1="150" y1="170" x2="150" y2="142" style="animation-delay:2.35s"/>' +

      '<line class="sc-ln dim" pathLength="1" x1="40" y1="46" x2="190" y2="46" style="animation-delay:2.5s"/>' +

      '<line class="sc-ln dim" pathLength="1" x1="190" y1="42" x2="190" y2="50" style="animation-delay:2.5s"/>' +
      '<text class="sc-num" x="115" y="44" text-anchor="middle" style="animation-delay:2.8s">2400</text>' +

      '<line class="sc-ln dim" pathLength="1" x1="33" y1="55" x2="33" y2="170" style="animation-delay:2.9s"/>' +
      '<line class="sc-ln dim" pathLength="1" x1="29" y1="55" x2="37" y2="55" style="animation-delay:2.9s"/>' +
      '<line class="sc-ln dim" pathLength="1" x1="29" y1="170" x2="37" y2="170" style="animation-delay:2.9s"/>' +
      '<text class="sc-num" x="31" y="114" text-anchor="middle" transform="rotate(-90 31 114)" style="animation-delay:3.2s">2100</text>' +

      '<rect class="sc-ln" pathLength="1" x="212" y="58" width="78" height="68" style="animation-delay:1.3s"/>' +
      '<line class="sc-ln thin" pathLength="1" x1="212" y1="104" x2="290" y2="104" style="animation-delay:1.7s"/>' +
      '<line class="sc-ln thin" pathLength="1" x1="212" y1="86" x2="256" y2="86" style="animation-delay:2.0s"/>' +
      '<text class="sc-lbl" x="251" y="68" text-anchor="middle" style="animation-delay:2.3s">SECTION A-A</text>' +

      '<rect class="sc-ln" pathLength="1" x="212" y="140" width="78" height="40" style="animation-delay:3.0s"/>' +
      '<line class="sc-ln thin" pathLength="1" x1="212" y1="158" x2="290" y2="158" style="animation-delay:3.3s"/>' +
      '<line class="sc-ln thin" pathLength="1" x1="252" y1="158" x2="252" y2="180" style="animation-delay:3.45s"/>' +
      '<text class="sc-lbl" x="217" y="152" style="animation-delay:3.5s">SAWO CAD</text>' +
      '<text class="sc-lbl" x="217" y="171" style="animation-delay:3.7s">SAUNA</text>' +
      '<text class="sc-lbl" x="257" y="171" style="animation-delay:3.85s">REV A</text>' +
    '</svg>';

  function renderScan(label){
    output.innerHTML = '<div class="sc-scan-wrap"><div class="sc-scan">' + CAD_SCAN_SVG + '</div>' +
      '<div class="sc-scan-label" id="sc-scanLabel">' + label + '</div>' +
      '<div class="sc-scan-progress"><div class="sc-scan-progress-fill" id="sc-scanFill"></div></div>' +
      '<div class="sc-scan-pct" id="sc-scanPct">0%</div></div>';
    outActions.classList.remove('visible');
    setProgress(progValue);
  }
  function updateScanLabel(text){
    const el = document.getElementById('sc-scanLabel');
    if(el && el.textContent !== text) el.textContent = text;
  }

  function setProgress(p){
    progValue = p;
    const fill = document.getElementById('sc-scanFill');
    const pct = document.getElementById('sc-scanPct');
    if(fill) fill.style.width = p + '%';
    if(pct) pct.textContent = Math.round(p) + '%';
  }
  function progLabelFor(p){
    if(p < 30) return 'Plotting outline…';
    if(p < 60) return 'Adding dimensions…';
    if(p < 85) return 'Detailing benches & vents…';
    return 'Finalizing drawing…';
  }
  function startProgress(){
    stopProgress();
    setProgress(0);
    const start = Date.now();
    const cap = 95, t1 = 13;
    progTimer = setInterval(() => {
      const t = (Date.now() - start) / 1000;
      const eased = t <= t1
        ? (t / t1) * 80
        : 80 + (cap - 80) * (1 - Math.exp(-(t - t1) / 11));
      const next = Math.max(progValue, Math.min(cap, eased));
      setProgress(next);
      updateScanLabel(progLabelFor(next));
    }, 120);
  }

  function finishProgress(){
    stopProgress();
    updateScanLabel('Drawing ready');
    const fill = document.getElementById('sc-scanFill');
    if(fill) fill.style.transition = 'width 0.7s ease';
    setProgress(100);
    return new Promise((resolve) => setTimeout(resolve, 780));
  }
  function stopProgress(){ if(progTimer){ clearInterval(progTimer); progTimer = null; } }
  function renderError(message){
    output.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'sc-error';
    const ic = document.createElement('i');
    ic.className = 'fas fa-triangle-exclamation err-icon';
    div.appendChild(ic);
    div.appendChild(document.createTextNode('Generation failed:\n\n' + message));
    output.appendChild(div);
    outActions.classList.remove('visible');
  }
  function renderImage(url){
    currentImageUrl = url;
    output.innerHTML = '';
    const frame = document.createElement('div');
    frame.className = 'sc-frame';
    const img = document.createElement('img');
    img.src = url;
    img.alt = 'Generated technical CAD drawing';
    img.addEventListener('click', () => openLightbox(url));
    frame.appendChild(img);
    output.appendChild(frame);
    outActions.classList.add('visible');
  }

  function openLightbox(url){ lightboxImg.src = url; lightbox.classList.add('visible'); }
  function closeLightbox(){ lightbox.classList.remove('visible'); }
  lightbox.addEventListener('click', closeLightbox);
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && lightbox.classList.contains('visible')) closeLightbox(); });

  downloadBtn.addEventListener('click', () => {
    if(!currentImageUrl) return;
    const a = document.createElement('a');
    a.href = currentImageUrl;
    a.download = 'cad-drawing.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
  });

  async function runPipeline(){
    try{
      setActiveModel('analyze');
      renderScan('Generating drawing dataset…');
      startProgress();
      const conversationDump = history.map(m => (m.role === 'user' ? 'CLIENT: ' : 'ASSISTANT: ') + m.content).join('\n\n');
      const { content: reply } = await callChatModel(
        [{ role: 'user', content: 'Here is the full conversation so far:\n\n' + conversationDump + '\n\nProduce the final txt block now, following the reference template structure exactly, using the gathered sauna measurements/door type and placing any accessories under REMARKS.' }],
        TXTBLOCK_SYSTEM_PROMPT,
        'analyze'
      );
      let txtBlock = reply.trim();
      const trigger = 'Generate the complete technical CAD drawing canvas image now.';
      if(!txtBlock.includes(trigger)){ txtBlock += '\n\n' + trigger; }
      loggedTxtBlock = txtBlock;

      await logSession();

      setActiveModel('image');
      renderScan('Rendering technical drawing…');
      const fullPrompt = IMAGE_SYSTEM_PREFIX + txtBlock;
      const imageUrl = await callImageModel(fullPrompt);

      await finishProgress();
      renderImage(imageUrl);
      addSysMsg('Drawing generated.');
      setActiveModel('converse');
      loggedImageGenerated = true;
      loggedImageUrl = imageUrl;
      logSession();

      promptSendToSales();
    } catch(err){
      stopProgress();
      renderError(err.message || String(err));
      addSysMsg('Error: ' + (err.message || String(err)));
    }
  }

  function promptSendToSales(){
    if(salesPrompted) return;
    salesPrompted = true;
    const wrap = document.createElement('div');
    wrap.className = 'sc-msg bot';

    const salesTag = isEmbedded ? '<span class="sc-ai-tag scripted">NOT AI</span>' : '';
    wrap.innerHTML =
      '<span class="who">ASSISTANT' + salesTag + '</span>' +
      'Would you like to send this drawing to our sales team for a follow-up?' +
      '<div style="margin-top:10px; display:flex; gap:8px;">' +
        '<button type="button" id="sc-sales-yes" style="border:2px solid transparent;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:0.8rem;padding:7px 16px;background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%);color:#fff;">Yes, send to sales</button>' +
        '<button type="button" id="sc-sales-no" style="border:1.5px solid var(--line);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:0.8rem;padding:7px 16px;background:transparent;color:var(--brown-deep);">No, thanks</button>' +
      '</div>';
    chatThread.appendChild(wrap);
    chatThread.scrollTop = chatThread.scrollHeight;

    const yes = wrap.querySelector('#sc-sales-yes');
    const no = wrap.querySelector('#sc-sales-no');
    const disable = () => { yes.disabled = true; no.disabled = true; yes.style.opacity = no.style.opacity = '0.5'; };
    no.addEventListener('click', () => { disable(); addSysMsg('No problem — not sent to sales.'); });
    yes.addEventListener('click', async () => {
      disable();
      try{
        const resp = await fetch(SAWO_API_BASE + '/api/conversations?action=sendToSales', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId })
        });
        if(!resp.ok){ const e = await resp.json().catch(()=>({})); throw new Error(e.error || ('HTTP ' + resp.status)); }
        addSysMsg('Sent to sales — they’ll be in touch. ✓');
      }catch(err){ addSysMsg('Could not notify sales: ' + (err.message || String(err))); }
    });
  }

  const LEAD_TAG = '[LEAD_CAPTURED]';
  function parseLeadTag(reply){
    const idx = reply.indexOf(LEAD_TAG);
    if(idx === -1) return { visible: reply.trim(), captured: null };
    const visible = reply.slice(0, idx).trim();
    const m = reply.slice(idx + LEAD_TAG.length).match(/\{[\s\S]*\}/);
    let captured = null;
    if(m){ try{ captured = JSON.parse(m[0]); }catch(e){ captured = null; } }
    return { visible, captured };
  }
  function leadIsValid(c){

    if(!(c && String(c.name || '').trim() && isValidEmail(c.email) && String(c.location || '').trim())) return false;
    const phone = String(c.phone || '').trim();
    return phone === '' || isValidPhone(phone);
  }

  async function runLeadCapture(){
    if(busy) return;
    busy = true;
    sendBtn.disabled = true;

    setActiveModel('converse');
    const typingEl = addTyping();
    try{
      const { content: reply, model } = await callChatModel(history, LEAD_SYSTEM_PROMPT, 'converse');
      typingEl.remove();
      const { visible, captured } = parseLeadTag(reply);
      const done = leadIsValid(captured);

      if(visible) addMsg('bot', visible, { ai: true, model: friendlyModel(model) });

      if(visible) history.push({ role: 'assistant', content: visible, model: model });

      if(done){
        lead.name = String(captured.name).trim();
        lead.email = String(captured.email).trim();
        lead.phone = String(captured.phone).trim();
        lead.location = String(captured.location || '').trim();
        leadStage = 'done';

        if(!visible){
          const opener = 'Thanks, I have your details. Now, what are the overall outer dimensions of the sauna room - width, depth, and height in millimetres?';
          addMsg('bot', opener, { ai: true, model: friendlyModel(model) });
          history.push({ role: 'assistant', content: opener, model: model });
        }
      }
      logSession();

    } catch(err){
      typingEl.remove();
      addSysMsg('Error: ' + (err.message || String(err)));
    } finally {
      busy = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  async function runAssistant(){
    if(busy) return;
    busy = true;
    sendBtn.disabled = true;

    setActiveModel('converse');
    const typingEl = addTyping();
    try{
      const { content: reply, model } = await callChatModel(history, SYSTEM_PROMPT, 'converse');
      typingEl.remove();
      const TRIGGER_TAG = '[READY_TO_GENERATE]';
      const triggered = reply.includes(TRIGGER_TAG);
      const cleaned = reply.replace(TRIGGER_TAG, '').trim();
      if(cleaned) addMsg('bot', cleaned, { ai: true, model: friendlyModel(model) });
      history.push({ role: 'assistant', content: reply, model: model });
      logSession();
      if(triggered){ await runPipeline(); }
    } catch(err){
      typingEl.remove();
      addSysMsg('Error: ' + (err.message || String(err)));
    } finally {
      busy = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  async function sendChat(){
    if(busy) return;
    const text = chatInput.value.trim();
    if(!text) return;

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    updateClearBtn();
    chatInput.value = '';

    if(leadStage !== 'done'){
      logSession();
      await runLeadCapture();
      return;
    }

    await runAssistant();
  }

  sendBtn.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendChat(); }
  });

  const clearBtn = document.getElementById('sc-clearBtn');
  if(clearBtn) clearBtn.addEventListener('click', () => {
    const hasConvo = history.some(m => m && m.role === 'user');
    if(hasConvo && !confirm('Clear this conversation and start over?')) return;
    clearConversation();
  });

  renderEmpty();

  const saved = loadState();
  if(saved && Array.isArray(saved.history) && saved.history.length){
    restoreState(saved);
  } else {
    initChat();
  }
  loadModelConfig();
})();
</script>
