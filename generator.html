<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAD Generator — SAWO</title>
<!--
  CMS "CAD Generator" wrapper. This is just the branded page header (with the
  Supabase log-connectivity status pill) plus an iframe that embeds the single
  generator UI (conversation-wp.html). Keeping the generator itself in
  conversation-wp.html means there is ONE generator UI to maintain — the same
  file is pasted into WordPress and embedded here.
-->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --brown: #AF8564;
    --brown-deep: #AF8564;
    --brown-mid: #A67853;
    --brown-light: #C4A574;
    --black: #141617;
    --bg: #faf7f3;
    --panel: #ffffff;
    --line: #e7ddd2;
    --text-dim: #8a7c6e;
  }
  *{ box-sizing: border-box; }
  html, body{ height: 100%; }
  body{
    margin: 0;
    background: var(--bg);
    color: var(--black);
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── Shared page header (identical across all CMS frames) ── */
  .page-header{
    display:flex; align-items:center; gap:14px; padding:16px 26px; background:var(--panel);
    border-bottom:1px solid var(--line); flex-shrink:0; box-shadow:0 1px 0 rgba(139,94,60,0.04);
  }
  .ph-icon{
    width:42px; height:42px; border-radius:11px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff; font-size:1.05rem;
    box-shadow:0 6px 16px rgba(166,120,83,0.32);
  }
  .ph-text h2{ font-size:1.08rem; font-weight:700; margin:0; color:var(--brown-deep); letter-spacing:0.2px; }
  .ph-text p{ font-size:0.74rem; color:var(--text-dim); margin:1px 0 0; }
  .actions{ margin-left:auto; display:flex; align-items:center; gap:12px; }
  .log-status{
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 20px;
    white-space: nowrap;
  }
  .log-status .dot{
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .log-status.connecting .dot{ animation: logpulse 1s ease-in-out infinite; }
  .log-status.live{ color: #4A9D4A; border-color: rgba(74,157,74,0.35); }
  .log-status.live .dot{ background: #4A9D4A; box-shadow: 0 0 8px rgba(74,157,74,0.7); }
  .log-status.error{ color: #C9302C; border-color: rgba(201,48,44,0.35); }
  .log-status.error .dot{ background: #C9302C; }
  @keyframes logpulse{ 0%,100%{ opacity: 1; } 50%{ opacity: 0.25; } }
  @media (max-width: 640px){
    .log-status #logStatusText{ display: none; }
    .log-status{ padding: 6px; }
  }

  /* ── Live usage metrics bar (updated by the embedded generator) ── */
  .metrics-bar{
    display:flex; align-items:center; gap:8px 20px; flex-wrap:wrap;
    padding:9px 26px; background:#fff; border-bottom:1px solid var(--line);
    flex-shrink:0; font-size:0.74rem; color:var(--text-dim);
  }
  .metrics-bar.collapsed{ display:none; }
  .mb-title{ display:inline-flex; align-items:center; gap:7px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; font-size:0.66rem; color:var(--brown-deep); }
  .mb-title i{ color:var(--brown-mid); }
  .mb-item{ display:inline-flex; align-items:center; gap:7px; }
  .mb-item > i{ width:14px; text-align:center; color:var(--brown-mid); }
  .mb-item b{ color:var(--black); font-weight:700; font-variant-numeric:tabular-nums; }
  .mb-item .mb-sub{ color:var(--text-dim); }
  .mb-pipe{ font-weight:700; padding:2px 10px; border-radius:9px; background:rgba(139,92,246,0.14); color:#7C4DD6; display:inline-flex; align-items:center; gap:6px; }
  .mb-pipe.p1{ background:rgba(201,154,44,0.16); color:#9A7411; }
  .metrics-toggle{
    cursor:pointer; background:transparent; font-family:'Montserrat',sans-serif;
    color:var(--brown-deep); border:1px solid var(--line); border-radius:20px;
    padding:6px 12px; font-size:0.68rem; font-weight:600; text-transform:uppercase;
    letter-spacing:0.05em; display:inline-flex; align-items:center; gap:7px; white-space:nowrap;
  }
  .metrics-toggle:hover{ border-color:var(--brown-mid); color:var(--brown-mid); }

  /* ── Embedded generator ── */
  #genFrame{ flex:1; border:none; width:100%; min-height:0; background:var(--bg); }
</style>
</head>
<body>

  <header class="page-header">
    <div class="ph-icon"><i class="fas fa-compass-drafting"></i></div>
    <div class="ph-text">
      <h2>CAD Generator</h2>
      <p>Technical sauna drawing synthesis</p>
    </div>
    <div class="actions">
      <button class="metrics-toggle" id="metricsToggle" title="Toggle live token/cost metrics"><i class="fas fa-chart-simple"></i> <span>Hide metrics</span></button>
      <div class="log-status" id="modelStatus" title="AI model currently in use" style="display:none;">
        <i class="fas fa-microchip" style="font-size:0.8rem;"></i>
        <span id="modelStatusText"></span>
      </div>
      <div class="log-status connecting" id="logStatus" title="Supabase conversation logging">
        <span class="dot"></span>
        <span id="logStatusText">Log: connecting…</span>
      </div>
    </div>
  </header>

  <!-- Live usage metrics — fed by the embedded generator's AI calls. -->
  <div class="metrics-bar" id="metricsBar">
    <span class="mb-title"><i class="fas fa-gauge-high"></i> Live usage</span>
    <span class="mb-item"><i class="fas fa-coins"></i> <b id="mbTokens">0</b> tokens <span class="mb-sub" id="mbInOut">(0 in · 0 out)</span></span>
    <span class="mb-item"><i class="fas fa-sack-dollar"></i> <b id="mbCost">$0.0000</b></span>
    <span class="mb-item"><i class="fas fa-comments"></i> <b id="mbCalls">0</b> calls</span>
    <span class="mb-pipe p1" id="mbPipe"><i class="fas fa-microchip"></i> Pipeline 1</span>
  </div>

  <!-- Single-source generator UI (same file pasted into WordPress). -->
  <iframe id="genFrame" title="CAD Generator" src="/conversation-wp.html"></iframe>

<script>
(function(){
  // Header log-connectivity pill — pings the CMS endpoint (same origin, no row
  // written) so the header shows whether conversation logging is reachable.
  const logStatusEl = document.getElementById('logStatus');
  const logStatusText = document.getElementById('logStatusText');
  function setLogStatus(state, text){
    if(!logStatusEl) return;
    logStatusEl.classList.remove('connecting', 'live', 'error');
    logStatusEl.classList.add(state);
    logStatusText.textContent = text;
  }
  async function checkLogStatus(){
    setLogStatus('connecting', 'Log: connecting…');
    try{
      const resp = await fetch('/api/conversations?action=ping');
      if(resp.ok) setLogStatus('live', 'Log: connected');
      else setLogStatus('error', 'Log: error ' + resp.status);
    } catch(e){ setLogStatus('error', 'Log: offline'); }
  }
  checkLogStatus();

  // Active-model pill — the embedded generator (conversation-wp.html) posts up
  // which AI model is doing the current phase (gathering / finalizing /
  // rendering). Shown here in the page header, not inside the chat widget.
  const modelStatusEl = document.getElementById('modelStatus');
  const modelStatusText = document.getElementById('modelStatusText');

  // ── Live usage metrics bar ──
  // The embedded generator posts running token/cost totals after each AI call.
  // cms.js isn't loaded here, so format compactly inline.
  const metricsBar = document.getElementById('metricsBar');
  const metricsToggle = document.getElementById('metricsToggle');
  const mbTokens = document.getElementById('mbTokens');
  const mbInOut = document.getElementById('mbInOut');
  const mbCost = document.getElementById('mbCost');
  const mbCalls = document.getElementById('mbCalls');
  const mbPipe = document.getElementById('mbPipe');
  const fmtInt = (n) => (Number(n) || 0).toLocaleString('en-US');
  const fmtCompact = (n) => {
    n = Number(n) || 0;
    if(n >= 1e6) return (n / 1e6).toFixed(n >= 1e7 ? 0 : 1) + 'M';
    if(n >= 1e4) return (n / 1e3).toFixed(0) + 'K';
    if(n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return String(n);
  };
  const fmtCost = (n) => '$' + (Number(n) || 0).toFixed(4);

  function renderUsage(totals, mode){
    const t = totals || {};
    mbTokens.textContent = fmtCompact(t.tokens || 0);
    mbInOut.textContent = '(' + fmtInt(t.input || 0) + ' in · ' + fmtInt(t.output || 0) + ' out)';
    mbCost.textContent = fmtCost(t.cost || 0);
    mbCalls.textContent = fmtInt(t.calls || 0);
    if(mode != null){
      const p2 = Number(mode) === 2;
      mbPipe.className = 'mb-pipe' + (p2 ? '' : ' p1');
      mbPipe.innerHTML = '<i class="fas ' + (p2 ? 'fa-layer-group' : 'fa-microchip') + '"></i> Pipeline ' + (p2 ? '2 · 3-model' : '1 · single');
    }
  }

  // Collapse state persists across sessions.
  function setMetricsCollapsed(collapsed){
    metricsBar.classList.toggle('collapsed', collapsed);
    metricsToggle.querySelector('span').textContent = collapsed ? 'Show metrics' : 'Hide metrics';
    localStorage.setItem('cms-metrics-collapsed', collapsed ? '1' : '0');
  }
  setMetricsCollapsed(localStorage.getItem('cms-metrics-collapsed') === '1');
  metricsToggle.addEventListener('click', () => setMetricsCollapsed(!metricsBar.classList.contains('collapsed')));

  window.addEventListener('message', function(e){
    const d = e.data;
    if(!d) return;
    if(d.type === 'sawocad-model'){
      modelStatusEl.style.display = '';
      modelStatusText.textContent = 'AI: ' + d.model + (d.phaseText ? ' · ' + d.phaseText : '');
    } else if(d.type === 'sawocad-usage'){
      renderUsage(d.totals, d.mode);
    }
  });
})();
</script>

</body>
</html>
