<!-- aicad.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAD Drawing Generator — SAWO</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --brown: #AF8564;
    --brown-deep: #AF8564;
    --brown-mid: #A67853;
    --brown-light: #C4A574;
    --black: #141617;
    --bg: #faf7f3;
    --panel: #ffffff;
    --line: #e7ddd2;
    --text-dim: #8a7c6e;
  }

  *{ box-sizing: border-box; }
  html, body{ height: 100%; }
  body{
    margin: 0;
    background: var(--bg);
    color: var(--black);
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── API KEY GATE ── */
  #gate{
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  #gate .gate-box{
    background: var(--panel);
    border-radius: 18px;
    border-top: 5px solid var(--brown-mid);
    padding: 38px 34px;
    width: 400px;
    max-width: 100%;
    box-shadow: 0 25px 70px rgba(139,94,60,0.18);
    text-align: center;
  }
  #gate .gate-logo{ height: 40px; width: auto; margin-bottom: 20px; }
  #gate h1{
    font-size: 1.45rem;
    font-weight: 700;
    margin: 0 0 6px;
    background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #gate .gate-sub{ font-size: 0.9rem; color: var(--text-dim); margin: 0 0 24px; }
  #gate label{
    display: flex;
    align-items: center;
    gap: 7px;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--brown-deep);
    margin-bottom: 8px;
  }
  #keyInput{
    width: 100%;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--black);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.95rem;
    padding: 11px 13px;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }
  #keyInput:focus{ border-color: var(--brown-mid); }
  #enterBtn{
    width: 100%;
    margin-top: 16px;
    border: 2px solid transparent;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 12px 0;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    transition: all 0.3s ease;
  }
  #enterBtn:hover{ background: #fff; color: var(--brown-deep); border-color: var(--brown-mid); }
  #gate .gate-note{
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
    line-height: 1.5;
  }
  #gate .gate-err{ font-size: 0.8rem; color: #C9302C; margin-top: 12px; min-height: 16px; font-weight: 600; }

  /* ── SHELL ── */
  #shell{ display: none; flex-direction: column; height: 100vh; }
  #shell.visible{ display: flex; }

  /* ── Shared page header (identical across all CMS frames) ── */
  .page-header{
    display:flex; align-items:center; gap:14px; padding:16px 26px; background:var(--panel);
    border-bottom:1px solid var(--line); flex-shrink:0; box-shadow:0 1px 0 rgba(139,94,60,0.04);
  }
  .ph-icon{
    width:42px; height:42px; border-radius:11px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff; font-size:1.05rem;
    box-shadow:0 6px 16px rgba(166,120,83,0.32);
  }
  .ph-text h2{ font-size:1.08rem; font-weight:700; margin:0; color:var(--brown-deep); letter-spacing:0.2px; }
  .ph-text p{ font-size:0.74rem; color:var(--text-dim); margin:1px 0 0; }
  .actions{ margin-left:auto; display:flex; align-items:center; gap:12px; }
  .log-status{
    margin-left: auto;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.68rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 20px;
    white-space: nowrap;
  }
  .log-status .dot{
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .log-status.connecting .dot{ animation: logpulse 1s ease-in-out infinite; }
  .log-status.live{ color: #4A9D4A; border-color: rgba(74,157,74,0.35); }
  .log-status.live .dot{ background: #4A9D4A; box-shadow: 0 0 8px rgba(74,157,74,0.7); }
  .log-status.error{ color: #C9302C; border-color: rgba(201,48,44,0.35); }
  .log-status.error .dot{ background: #C9302C; }
  @keyframes logpulse{ 0%,100%{ opacity: 1; } 50%{ opacity: 0.25; } }
  @media (max-width: 640px){
    .log-status #logStatusText{ display: none; }
    .log-status{ padding: 6px; }
  }

  /* ── APP GRID ── */
  #app{
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 18px;
    flex: 1;
    min-height: 0;
    padding: 18px;
    background: var(--bg);
  }

  .left, .right{
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(139,94,60,0.10);
  }

  .col-head{
    display: flex;
    align-items: center;
    gap: 9px;
    border-bottom: 1px solid var(--line);
    padding: 13px 16px;
    font-size: 0.74rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--brown-deep);
    flex-shrink: 0;
    background: var(--panel);
  }
  .col-head i{ color: var(--brown-mid); }

  /* ── CHAT ── */
  #chatThread{
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
    background: var(--bg);
  }
  #chatThread::-webkit-scrollbar{ width: 7px; }
  #chatThread::-webkit-scrollbar-thumb{ background: var(--line); border-radius: 4px; }
  .msg{
    padding: 10px 13px;
    max-width: 92%;
    white-space: pre-wrap;
    word-break: break-word;
    border-radius: 12px;
    font-size: 0.86rem;
    line-height: 1.55;
  }
  .msg.bot{
    align-self: flex-start;
    background: #fff;
    border-left: 4px solid var(--brown-mid);
    box-shadow: 0 5px 15px rgba(139,94,60,0.08);
    border-top-left-radius: 4px;
  }
  .msg.user{
    align-self: flex-end;
    background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%);
    color: #fff;
    box-shadow: 0 5px 15px rgba(139,94,60,0.2);
    border-top-right-radius: 4px;
  }
  .msg.sys{
    align-self: center;
    background: transparent;
    text-align: center;
    font-size: 0.76rem;
    color: var(--text-dim);
    max-width: 100%;
    padding: 4px 8px;
  }
  .msg .who{
    display: block;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
  }
  .msg.bot .who{ color: var(--brown-mid); }
  .msg.user .who{ color: rgba(255,255,255,0.8); }

  /* Typing indicator shown while the assistant is preparing a reply */
  .typing-dots{ display: inline-flex; align-items: center; gap: 5px; padding: 3px 2px; }
  .typing-dots span{
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--brown-mid); opacity: 0.4;
    animation: typing-bounce 1.2s infinite ease-in-out both;
  }
  .typing-dots span:nth-child(2){ animation-delay: 0.15s; }
  .typing-dots span:nth-child(3){ animation-delay: 0.3s; }
  @keyframes typing-bounce{
    0%, 80%, 100%{ transform: translateY(0); opacity: 0.4; }
    40%{ transform: translateY(-5px); opacity: 1; }
  }

  .chat-input-row{
    border-top: 1px solid var(--line);
    padding: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    background: var(--panel);
  }
  #chatInput{
    flex: 1;
    border: 1.5px solid var(--line);
    border-radius: 9px;
    background: #fff;
    color: var(--black);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.88rem;
    height: 44px;
    min-height: 44px;
    max-height: 140px;
    resize: none;
    padding: 11px 14px;
    line-height: 20px;
    outline: none;
    transition: border-color 0.2s;
    overflow-y: auto;
  }
  #chatInput:focus{ border-color: var(--brown-mid); }
  #sendBtn{
    border: 2px solid transparent;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    padding: 0;
    transition: all 0.3s ease;
  }
  #sendBtn:hover{ background: #fff; color: var(--brown-deep); border-color: var(--brown-mid); }
  #sendBtn:disabled{
    background: var(--line);
    color: var(--text-dim);
    border-color: var(--line);
    cursor: not-allowed;
  }

  /* ── OUTPUT ── */
  #output{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    overflow: auto;
    min-height: 0;
    background: var(--bg);
  }
  .empty-state{ text-align: center; max-width: 360px; }
  .empty-state .icon-wrapper{
    width: 86px; height: 86px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--brown-mid) 0%, var(--brown-light) 100%);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 10px 28px rgba(166,120,83,0.35), inset 0 2px 4px rgba(255,255,255,0.3);
  }
  .empty-state .icon-wrapper i{ font-size: 2.3rem; color: #fff; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
  .empty-state h3{
    font-size: 1.15rem;
    font-weight: 700;
    margin: 0 0 8px;
    color: var(--brown-deep);
  }
  .empty-state p{ font-size: 0.85rem; color: var(--text-dim); line-height: 1.6; margin: 0; }

  .result-frame{
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    max-width: 100%;
    box-shadow: 0 20px 55px rgba(139,94,60,0.18);
  }
  .result-frame img{ display: block; max-width: 100%; max-height: 78vh; cursor: zoom-in; }

  .error-state{
    text-align: center;
    max-width: 440px;
    white-space: pre-wrap;
    color: #C9302C;
    font-size: 0.88rem;
    line-height: 1.6;
  }
  .error-state .err-icon{ font-size: 2rem; margin-bottom: 12px; display: block; }

  /* ── SCAN ANIMATION ── */
  .scan-wrap{ text-align: center; }
  .scan{
    width: 320px;
    max-width: 70vw;
    height: 210px;
    border: 1px solid var(--line);
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    margin: 0 auto 16px;
    background: #fff;
    box-shadow: 0 10px 30px rgba(139,94,60,0.12);
  }
  .scan::before{
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: var(--brown);
    box-shadow: 0 0 14px 2px rgba(175,133,100,0.7);
    animation: scanmove 1.6s ease-in-out infinite;
  }
  @keyframes scanmove{ 0%{ top: 0; } 50%{ top: calc(100% - 2px); } 100%{ top: 0; } }
  .scan-label{
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--brown-deep);
  }
  .scan-progress{
    width: 320px;
    max-width: 70vw;
    height: 8px;
    margin: 14px auto 8px;
    background: var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  .scan-progress-fill{
    height: 100%;
    width: 0%;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--brown-mid) 0%, var(--brown-light) 100%);
    transition: width 0.3s ease;
  }
  .scan-pct{
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--brown-deep);
    letter-spacing: 0.04em;
  }

  .out-actions{
    border-top: 1px solid var(--line);
    padding: 12px 16px;
    flex-shrink: 0;
    display: none;
    background: var(--panel);
  }
  .out-actions.visible{ display: block; }
  #downloadBtn{
    border: 2px solid var(--brown-mid);
    border-radius: 8px;
    background: transparent;
    color: var(--brown-deep);
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 9px 16px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
  }
  #downloadBtn:hover{ background: linear-gradient(135deg, var(--brown-deep) 0%, var(--brown-mid) 100%); color: #fff; border-color: transparent; }

  /* ── LIGHTBOX ── */
  #lightbox{
    position: fixed;
    inset: 0;
    background: rgba(20,22,23,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 28px;
    cursor: zoom-out;
  }
  #lightbox.visible{ display: flex; }
  #lightbox img{ max-width: 100%; max-height: 100%; border: 2px solid var(--brown-mid); border-radius: 8px; }

  ::placeholder{ color: #b8a89a; }

  @media (max-width: 900px){
    #app{ grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  }
</style>
</head>
<body>

  <!-- API key + model selection are handled server-side (CMS admin Settings);
       the public tool no longer exposes any key/model controls. -->

  <!-- ══════════════ SHELL ══════════════ -->
  <div id="shell">

    <!-- HEADER -->
    <header class="page-header">
      <div class="ph-icon"><i class="fas fa-compass-drafting"></i></div>
      <div class="ph-text">
        <h2>CAD Generator</h2>
        <p>Technical sauna drawing synthesis</p>
      </div>
      <div class="actions">
        <div class="log-status connecting" id="logStatus" title="Supabase conversation logging">
          <span class="dot"></span>
          <span id="logStatusText">Log: connecting…</span>
        </div>
      </div>
    </header>

    <!-- APP -->
    <div id="app">
      <div class="left">
        <div class="col-head"><i class="fas fa-comments"></i> Requirements assistant</div>
        <div id="chatThread"></div>
        <div class="chat-input-row">
          <textarea id="chatInput" placeholder="Sauna for 5 persons."></textarea>
          <button id="sendBtn" title="Send message"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
      <div class="right">
        <div class="col-head"><i class="fas fa-image"></i> Preview</div>
        <div id="output">
          <div class="empty-state">
            <div class="icon-wrapper"><i class="fas fa-image"></i></div>
            <h3>Generated drawings appear here</h3>
            <p>Describe your sauna in the chat — your technical drawing is generated automatically once the assistant has enough detail and you confirm.</p>
          </div>
        </div>
        <div class="out-actions" id="outActions">
          <button id="downloadBtn"><i class="fas fa-download"></i> Download PNG</button>
        </div>
      </div>
    </div>

  </div>

  <!-- ══════════════ LIGHTBOX ══════════════ -->
  <div id="lightbox"><img id="lightboxImg" src="" alt="Generated drawing full size" /></div>

<script>
(function(){
  // ── Backend proxy config ──
  // All OpenRouter calls + conversation logging go through the CMS serverless API
  // so the API key and model choices stay server-side (managed in the admin
  // Settings page).
  // This copy is served from the SAME origin as the CMS API (it ships inside the
  // vercel/ app and is embedded in the CMS shell), so API_BASE is '' → all calls
  // are same-origin relative paths. That works in local dev (localhost:3000) and
  // in production (sawoaicad.vercel.app) with no CORS dependency. The standalone
  // public copy in SAUNA CAD/conversation.html keeps the absolute URL instead.
  const API_BASE = '';

  // ── Verbatim image system prefix (from original buildSystemPrefix) ──
  const IMAGE_SYSTEM_PREFIX = "Generate a complete technical CAD-style engineering drawing, drafted in a precise architectural/mechanical drafting convention: clean black linework on a white canvas, dimension lines with arrowheads and numeric callouts, labeled components with leader lines, a title block, and consistent line weights distinguishing outlines from hatching. ";

  // ── Verbatim reference template (from original) ──
  const REFERENCE_TEMPLATE = `================================================================================
CAD TECHNICAL DRAWING — SAUNA UNIT LAYOUT
DRAWING CONTAINS: FLOOR PLAN (Left) | SECTION VIEW (Right) | SPEC TABLE (Far Right)
DRAWING STYLE: Monochrome technical drafting — black linework on a pure white background ONLY. No color fills, no highlights, no blue, no yellow, no shading. All elements (benches, LED strips, vents, etc.) are drawn as plain black lines and labels.
================================================================================
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
SECTION 1: FLOOR PLAN [FIT TO SCALE]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
OVERALL OUTER DIMENSIONS (Floor Plan):
Total Width (horizontal): {W} mm
Total Height (vertical) : {H} mm

INNER CLEAR DIMENSIONS:
Inner Width  : {IW} mm
Inner Height : {IH} mm

HORIZONTAL DIMENSION BREAKDOWN (Bottom):
Left section : {L1} mm [contains HEATER + V2 CONTROL area]
Center section: {L2} mm [ENTRY]
Right section : {L3} mm
─────────────────────────────
Total         : {W} mm

VERTICAL DIMENSION BREAKDOWN (Right side):
Top zone      : {V1} mm [UPPER BENCH zone]
Middle zone   : {V2} mm [LOWER BENCH zone]
Bottom zone   : {V3} mm [FLOOR / HEATER zone]
─────────────────────────────
Total         : {IH} mm (inner height)

────────────────────────────────────────────────────────────────────────────────
WALL CONSTRUCTION (Floor Plan):
────────────────────────────────────────────────────────────────────────────────
Outer wall boundary : {W} × {H} mm
Inner cavity        : {IW} × {IH} mm
Wall thickness      : computed from outer/inner difference, each side
Wall material finish: Vertical tongue-and-groove cedar paneling (depicted as vertical parallel lines across all walls)

────────────────────────────────────────────────────────────────────────────────
INTERIOR ELEMENTS — FLOOR PLAN VIEW:
────────────────────────────────────────────────────────────────────────────────
[A] UPPER BENCH
Label       : "UPPER BENCH" "+ {UB_H}mm FROM FLOOR LINE"
Position    : Rear (top) of plan, spanning full interior width
Zone depth  : {V1} mm (from rear wall)
Indicator   : Bench edge line across full interior width (plain black linework, no color)

[B] LOWER BENCH
Label       : "LOWER BENCH" "+ {LB_H}mm FROM FLOOR LINE"
Position    : Middle zone, spanning full interior width
Zone depth  : {V2} mm
Indicator   : Bench edge line across full interior width (plain black linework, no color)

[C] FLOOR
Label       : "FLOOR"
Position    : Lower portion of interior (bottom zone)
Zone depth  : {V3} mm

[D] HEATER
Label       : "HEATER"
Position    : Bottom-left corner of interior plan
Depiction   : Oval/rounded rectangular shape with internal detail lines (sauna heater unit shown in plan view)
Lateral pos : Within the {L1} mm left section

[E] V2 CONTROL
Label       : "V2 CONTROL"
Position    : Bottom-left area, below heater zone (external/recessed panel on front-left wall)

[F] ENTRY / DOOR
Label       : "ENTRY"
Door type   : {DOOR_TYPE}
Position    : Bottom-center of floor plan
Width       : {L2} mm
Depiction   : Open entry/door swing shown

[G] AIRVENT (×2)
Labels      : "AIRVENT" — appears TWICE:
              1. Upper airvent — near top-center of interior (just below top bench area, centered horizontally)
              2. Lower airvent — mid-height center of interior (between upper and lower bench zones)
Depiction   : Small rectangular vent symbols with leader lines

[H] LED LIGHTS
Label       : "LED LIGHTS"
Position    : Top-left area, leader line pointing to upper-left corner zone
Depiction   : Strip/row of LED fixtures along upper perimeter

[I] BENCH SENSOR
Label       : "BENCH SENSOR"
Position    : Top-right area, leader line pointing to right-side top area
Depiction   : Small sensor element on/near bench

[J] NORTH ARROW / ORIENTATION MARKER
Position    : Top-center of floor plan (above outer wall)
Depiction   : Arrow with flag/triangle indicator

────────────────────────────────────────────────────────────────────────────────
FLOOR PLAN — TITLE BLOCK (Bottom Left):
────────────────────────────────────────────────────────────────────────────────

  async function logSession(){
    const clientSpoke = Array.isArray(history) && history.some(m => m && m.role === 'user' && String(m.content || '').trim());

    try{
      const resp = await fetch(API_BASE + '/api/conversations?action=log', {

        headers: { 'Content-Type': 'application/json' },

          messages: history,
          txt_block: loggedTxtBlock,
          image_generated: loggedImageGenerated,
          image_url: loggedImageUrl,
          user_agent: navigator.userAgent
        })
      });
      if(resp.ok){
        const t = new Date().toLocaleTimeString();
        setLogStatus('live', 'Log: saved ✓ ' + t);
      } else {
        setLogStatus('error', 'Log: error ' + resp.status);

  // ── Chat rendering ──
  // Escape HTML, then render a tiny safe subset of markdown so the assistant's
  // **bold** labels show as real bold instead of literal asterisks. Only
  // <strong>/<em> are injected into already-escaped text, so this is XSS-safe.
  function escapeHtml(s){
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
  function renderRich(text){
    let h = escapeHtml(text);
    h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
         .replace(/__([^_]+)__/g, '<strong>$1</strong>');
    h = h.replace(/(^|[^*])\*(?!\*)([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
    h = h.replace(/\*/g, '');   // strip any leftover stray asterisks
    return h;
  }

  // ── Chat call (via CMS proxy; model + key chosen server-side) ──
  async function callChatModel(messages, systemPrompt){
    const resp = await fetch(API_BASE + '/api/openrouter?type=chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages, systemPrompt })

    const raw = await resp.text();
    let data;
    try{ data = JSON.parse(raw); }
    catch(e){ throw new Error('Non-JSON response (HTTP ' + resp.status + ').'); }
    if(!resp.ok) throw new Error(data && data.error ? data.error : ('HTTP ' + resp.status));
    if(!data.content) throw new Error('No reply content returned.');
    return data.content;
  }

  // ── Image generation call (via CMS proxy; model/size/ratio + key server-side) ──
  async function callImageModel(fullPrompt){

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: fullPrompt })

    const raw = await resp.text();
    let data;
    try{ data = JSON.parse(raw); }
    catch(e){ throw new Error('Non-JSON response from server (HTTP ' + resp.status + ').'); }
    if(!resp.ok) throw new Error(data && data.error ? data.error : ('HTTP ' + resp.status));
    if(!data.imageUrl) throw new Error('Model responded but no image was found in the result. Try rephrasing the brief.');
    return data.imageUrl;

          body: JSON.stringify({ sessionId })
        });
        if(!resp.ok){ const e = await resp.json().catch(()=>({})); throw new Error(e.error || ('HTTP ' + resp.status)); }
        addSysMsg('Sent to sales — they’ll be in touch. ✓');
      }catch(err){
        addSysMsg('Could not notify sales: ' + (err.message || String(err)));
      }
    });
  }

  // ── Lead capture ──
  // Bot question helper: shows the question AND records it in history so the
  // captured details appear in the saved transcript.
  function askBot(text){
    addMsg('bot', text);
    history.push({ role: 'assistant', content: text });
    logSession();
  }

  // Sequential lead capture: Name → Email → Phone → Location (optional). Runs
  // before the AI conversation; only when complete does the model take over.
  function advanceLead(text){
    const val = text.trim();
    switch(leadStage){
      case 'preference':
        // The client's first message is their initial sauna preference; it is
        // already in history. Now start collecting their contact details.
        leadStage = 'name';
        askBot("Great — I'd love to help with that. First, could I get your name?");
        break;
      case 'name':
        if(!val){ askBot("Sorry, I didn't catch that — what's your name?"); break; }
        lead.name = val;
        leadStage = 'email';
        askBot("Thanks, " + lead.name + "! What's the best email address to reach you at?");
        break;
      case 'email':
        if(!isValidEmail(val)){ askBot("That doesn't look like a valid email address. Could you re-enter it? (e.g. name@company.com)"); break; }
        lead.email = val;
        leadStage = 'phone';
        askBot("Got it. And your phone number?");
        break;
      case 'phone':
        if(!isValidPhone(val)){ askBot("That phone number doesn't look quite right. Could you re-enter it, including the country/area code?"); break; }
        lead.phone = val;
        leadStage = 'location';
        askBot("Thanks! Which country are you in? (optional — type your country, or \"skip\")");
        break;
      case 'location':
        if(val && !/^skip$/i.test(val)) lead.location = val;
        leadStage = 'done';
        logSession();
        // Hand off to the assistant to continue into the sauna specs.
        runAssistant();
        break;
    }
  }

  // ── Assistant turn (model call + ready-to-generate trigger) ──
  async function runAssistant(){
    if(busy) return;
    busy = true;
    sendBtn.disabled = true;

    const typingEl = addTyping();

    try{
      const reply = await callChatModel(history, SYSTEM_PROMPT);
      typingEl.remove();

      const TRIGGER_TAG = '[READY_TO_GENERATE]';
      const triggered = reply.includes(TRIGGER_TAG);
      const cleaned = reply.replace(TRIGGER_TAG, '').trim();

      if(cleaned) addMsg('bot', cleaned);
      history.push({ role: 'assistant', content: reply });
      logSession();

      if(triggered){
        await runPipeline();
      }
    } catch(err){
      typingEl.remove();
      addSysMsg('Error: ' + (err.message || String(err)));
    } finally {
      busy = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  // ── Send chat ──
  async function sendChat(){
    if(busy) return;
    const text = chatInput.value.trim();
    if(!text) return;

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    chatInput.value = '';

    // Collect the client's contact details before the AI conversation begins.
    if(leadStage !== 'done'){
      logSession();
      advanceLead(text);
      return;
    }

    await runAssistant();
  }

  sendBtn.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendChat();
    }
  });

  renderEmpty();
})();
</script>
