<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAWO CAD CMS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --brown:#AF8564; --brown-deep:#8B5E3C; --brown-mid:#A67853; --brown-light:#C4A574;
    --black:#141617; --bg:#faf7f3; --panel:#fff; --line:#e7ddd2; --text-dim:#8a7c6e;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{ margin:0; background:var(--bg); color:var(--black); font-family:'Montserrat',sans-serif; font-size:14px; }
  #shell{ display:flex; flex-direction:column; height:100vh; }
  .topbar{
    display:flex; align-items:center; gap:14px; padding:12px 24px; background:var(--panel);
    border-bottom:1px solid var(--line); flex-shrink:0; box-shadow:0 2px 12px rgba(139,94,60,0.06);
  }
  .topbar .logo{ height:34px; width:auto; }
  .brand-divider{ width:1px; height:30px; background:var(--line); }
  .brand-icon{
    width:38px; height:38px; border-radius:9px;
    background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%);
    display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.05rem;
    box-shadow:0 6px 16px rgba(166,120,83,0.35);
  }
  .brand-text h1{ font-size:1.02rem; font-weight:700; margin:0; color:var(--brown-deep); letter-spacing:0.2px; }
  .brand-text .sub{ font-size:0.7rem; color:var(--text-dim); letter-spacing:0.04em; text-transform:uppercase; }
  nav{ display:flex; gap:8px; margin-left:18px; }
  .nav-btn{
    border:1.5px solid var(--line); border-radius:8px; background:transparent; color:var(--brown-deep);
    font-family:'Montserrat',sans-serif; font-weight:600; font-size:0.75rem; letter-spacing:0.04em;
    text-transform:uppercase; padding:8px 14px; cursor:pointer; display:inline-flex; align-items:center; gap:7px;
    transition:all 0.2s ease;
  }
  .nav-btn:hover{ border-color:var(--brown-mid); }
  .nav-btn.active{ background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff; border-color:transparent; }
  .actions{ margin-left:auto; display:flex; align-items:center; gap:12px; }
  .role-pill{
    display:inline-flex; align-items:center; gap:8px; font-size:0.7rem; font-weight:600;
    text-transform:uppercase; letter-spacing:0.05em; color:var(--brown-deep);
    padding:6px 13px; border:1px solid var(--line); border-radius:20px;
  }
  .role-pill .em{ color:var(--text-dim); text-transform:none; letter-spacing:0; font-weight:400; }
  .btn{
    border:2px solid var(--brown-mid); border-radius:8px; background:transparent; color:var(--brown-deep);
    font-family:'Montserrat',sans-serif; font-weight:600; font-size:0.75rem; letter-spacing:0.04em;
    text-transform:uppercase; padding:8px 14px; cursor:pointer; display:inline-flex; align-items:center; gap:8px;
    transition:all 0.25s ease;
  }
  .btn:hover{ background:linear-gradient(135deg,var(--brown-deep) 0%,var(--brown-mid) 100%); color:#fff; border-color:transparent; }
  #frame{ flex:1; border:none; width:100%; min-height:0; background:var(--bg); }
  #boot{ flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-dim); font-size:0.9rem; gap:10px; }
</style>
</head>
<body>
  <div id="shell">
    <header class="topbar">
      <img class="logo" src="https://www.sawo.com/wp-content/uploads/2025/12/SAWO-logo.png" alt="SAWO" />
      <div class="brand-divider"></div>
      <div class="brand-icon"><i class="fas fa-compass-drafting"></i></div>
      <div class="brand-text">
        <h1>SAWO CAD CMS</h1>
        <div class="sub">Conversation logs &amp; configuration</div>
      </div>
      <nav id="nav"></nav>
      <div class="actions">
        <span class="role-pill" id="rolePill"><i class="fas fa-circle-notch fa-spin"></i></span>
        <button class="btn" id="logoutBtn"><i class="fas fa-arrow-right-from-bracket"></i> Logout</button>
      </div>
    </header>
    <div id="boot"><i class="fas fa-circle-notch fa-spin"></i> Loading…</div>
    <iframe id="frame" title="CMS content" style="display:none;"></iframe>
  </div>

<script src="/cms.js"></script>
<script>
(function(){
  const nav = document.getElementById('nav');
  const rolePill = document.getElementById('rolePill');
  const frame = document.getElementById('frame');
  const boot = document.getElementById('boot');
  const params = new URLSearchParams(location.search);
  const deepConversation = params.get('conversation');

  function setActive(key){
    [...nav.children].forEach(b => b.classList.toggle('active', b.dataset.key === key));
  }
  function loadFrame(src, key){
    frame.src = src;
    boot.style.display = 'none';
    frame.style.display = 'block';
    setActive(key);
  }

  function buildNav(role){
    const items = [{ key:'logs', label:'Logs', icon:'fa-comments', src:'/sales.html' }];
    if(role === 'admin'){
      items.push({ key:'users', label:'Users', icon:'fa-users-gear', src:'/admin.html?tab=users' });
      items.push({ key:'settings', label:'Settings', icon:'fa-gear', src:'/admin.html?tab=settings' });
    }
    nav.innerHTML = '';
    items.forEach(it => {
      const b = document.createElement('button');
      b.className = 'nav-btn'; b.dataset.key = it.key;
      b.innerHTML = '<i class="fas ' + it.icon + '"></i> ' + it.label;
      b.addEventListener('click', () => loadFrame(it.src, it.key));
      nav.appendChild(b);
    });
  }

  async function init(){
    const s = await CMS.session();
    if(!s.authenticated){ location.replace('/login?redirect=' + encodeURIComponent(location.pathname + location.search)); return; }

    rolePill.innerHTML = '<i class="fas fa-user-shield"></i> ' + s.role +
      ' <span class="em">' + CMS.esc(s.email || '') + '</span>';
    buildNav(s.role);

    // Permalink deep-link: open the logs frame focused on a specific conversation.
    if(deepConversation){
      loadFrame('/sales.html?id=' + encodeURIComponent(deepConversation), 'logs');
    } else {
      loadFrame('/sales.html', 'logs');
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', () => CMS.logout());
  init();
})();
</script>
</body>
</html>
